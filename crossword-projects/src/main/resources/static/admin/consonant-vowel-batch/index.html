<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자음-모음 조합 단어 수집 배치 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-card {
            transition: all 0.3s ease;
        }
        .status-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .progress-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .combination-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 2px;
            margin: 20px 0;
        }
        .combination-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .combination-cell.processed {
            background-color: #d4edda;
            color: #155724;
        }
        .combination-cell.current {
            background-color: #fff3cd;
            color: #856404;
            animation: pulse 1s infinite;
        }
        .combination-cell.pending {
            background-color: #f8f9fa;
            color: #6c757d;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .log-container {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }
        .log-info { color: #0d6efd; }
        .log-success { color: #198754; }
        .log-warning { color: #fd7e14; }
        .log-error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- 헤더 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-cogs text-primary"></i>
                        자음-모음 조합 단어 수집 배치 관리
                    </h1>
                    <div>
                        <a href="/K-CrossWord/admin/" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left"></i> 관리자 메인
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 상태 카드들 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-play-circle fa-2x text-primary mb-2"></i>
                        <h5 class="card-title">배치 상태</h5>
                        <p class="card-text" id="batchStatus">대기 중</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-chart-line fa-2x text-success mb-2"></i>
                        <h5 class="card-title">진행률</h5>
                        <p class="card-text" id="progress">0%</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-check-circle fa-2x text-success mb-2"></i>
                        <h5 class="card-title">성공</h5>
                        <p class="card-text" id="successCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-times-circle fa-2x text-danger mb-2"></i>
                        <h5 class="card-title">실패</h5>
                        <p class="card-text" id="failureCount">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 진행률 바 -->
        <div class="progress-container">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold">전체 진행률</span>
                <span id="progressText">0 / 196</span>
            </div>
            <div class="progress" style="height: 20px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                     role="progressbar" style="width: 0%" id="progressBar">
                </div>
            </div>
            <div class="mt-2">
                <small class="text-muted">현재 조합: <span id="currentCombination">-</span></small>
            </div>
        </div>

        <!-- 조합 그리드 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-th"></i>
                            자음-모음 조합 현황
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="combination-grid" id="combinationGrid">
                            <!-- 조합 그리드가 여기에 동적으로 생성됩니다 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 제어 버튼들 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-play"></i>
                            배치 제어
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <button class="btn btn-success btn-lg w-100 mb-2" id="startBatchBtn">
                                    <i class="fas fa-play"></i> 전체 배치 시작
                                </button>
                                <button class="btn btn-warning btn-lg w-100 mb-2" id="stopBatchBtn" disabled>
                                    <i class="fas fa-stop"></i> 배치 중단
                                </button>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">재시작 위치</label>
                                    <div class="input-group">
                                        <select class="form-select" id="resumeConsonant">
                                            <option value="ㄱ">ㄱ</option>
                                            <option value="ㄴ">ㄴ</option>
                                            <option value="ㄷ">ㄷ</option>
                                            <option value="ㄹ">ㄹ</option>
                                            <option value="ㅁ">ㅁ</option>
                                            <option value="ㅂ">ㅂ</option>
                                            <option value="ㅅ">ㅅ</option>
                                            <option value="ㅇ">ㅇ</option>
                                            <option value="ㅈ">ㅈ</option>
                                            <option value="ㅊ">ㅊ</option>
                                            <option value="ㅋ">ㅋ</option>
                                            <option value="ㅌ">ㅌ</option>
                                            <option value="ㅍ">ㅍ</option>
                                            <option value="ㅎ">ㅎ</option>
                                        </select>
                                        <select class="form-select" id="resumeVowel">
                                            <option value="ㅏ">ㅏ</option>
                                            <option value="ㅑ">ㅑ</option>
                                            <option value="ㅓ">ㅓ</option>
                                            <option value="ㅕ">ㅕ</option>
                                            <option value="ㅗ">ㅗ</option>
                                            <option value="ㅛ">ㅛ</option>
                                            <option value="ㅜ">ㅜ</option>
                                            <option value="ㅠ">ㅠ</option>
                                            <option value="ㅡ">ㅡ</option>
                                            <option value="ㅣ">ㅣ</option>
                                            <option value="ㅢ">ㅢ</option>
                                            <option value="ㅘ">ㅘ</option>
                                            <option value="ㅙ">ㅙ</option>
                                            <option value="ㅞ">ㅞ</option>
                                        </select>
                                        <button class="btn btn-info" id="resumeBatchBtn">
                                            <i class="fas fa-redo"></i> 재시작
                                        </button>
                                    </div>
                                </div>
                                <button class="btn btn-outline-primary w-100" id="testCombinationBtn">
                                    <i class="fas fa-flask"></i> 단일 조합 테스트
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 로그 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="fas fa-terminal"></i>
                            실행 로그
                        </h5>
                        <button class="btn btn-sm btn-outline-secondary" id="clearLogBtn">
                            <i class="fas fa-trash"></i> 로그 지우기
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="log-container" id="logContainer">
                            <div class="log-entry log-info">시스템 준비 완료</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 전역 변수
        let statusUpdateInterval;
        let isRunning = false;

        // 자음과 모음 배열
        const consonants = ['ㄱ', 'ㄴ', 'ㄷ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅅ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const vowels = ['ㅏ', 'ㅑ', 'ㅓ', 'ㅕ', 'ㅗ', 'ㅛ', 'ㅜ', 'ㅠ', 'ㅡ', 'ㅣ', 'ㅢ', 'ㅘ', 'ㅙ', 'ㅞ'];

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            initializeCombinationGrid();
            updateStatus();
            setupEventListeners();
            
            // 5초마다 상태 업데이트
            statusUpdateInterval = setInterval(updateStatus, 5000);
        });

        // 조합 그리드 초기화
        function initializeCombinationGrid() {
            const grid = document.getElementById('combinationGrid');
            grid.innerHTML = '';

            consonants.forEach(consonant => {
                vowels.forEach(vowel => {
                    const cell = document.createElement('div');
                    cell.className = 'combination-cell pending';
                    cell.id = `cell-${consonant}-${vowel}`;
                    cell.textContent = `${consonant}${vowel}`;
                    cell.title = `초성: ${consonant}, 중성: ${vowel}`;
                    grid.appendChild(cell);
                });
            });
        }

        // 이벤트 리스너 설정
        function setupEventListeners() {
            document.getElementById('startBatchBtn').addEventListener('click', startBatch);
            document.getElementById('stopBatchBtn').addEventListener('click', stopBatch);
            document.getElementById('resumeBatchBtn').addEventListener('click', resumeBatch);
            document.getElementById('testCombinationBtn').addEventListener('click', testCombination);
            document.getElementById('clearLogBtn').addEventListener('click', clearLog);
        }

        // 배치 시작
        async function startBatch() {
            try {
                addLog('배치 시작 요청 중...', 'info');
                
                const response = await fetch('/K-CrossWord/api/consonant-vowel-batch/run-full-batch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    addLog('배치가 시작되었습니다.', 'success');
                    addLog(`예상 소요시간: ${result.estimatedDuration}`, 'info');
                    isRunning = true;
                    updateButtonStates();
                } else {
                    addLog(`배치 시작 실패: ${result.message}`, 'error');
                }
            } catch (error) {
                addLog(`배치 시작 중 오류: ${error.message}`, 'error');
            }
        }

        // 배치 중단
        async function stopBatch() {
            try {
                addLog('배치 중단 요청 중...', 'warning');
                
                const response = await fetch('/K-CrossWord/api/consonant-vowel-batch/stop', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    addLog('배치 중단 요청이 전송되었습니다.', 'warning');
                    isRunning = false;
                    updateButtonStates();
                } else {
                    addLog(`배치 중단 실패: ${result.message}`, 'error');
                }
            } catch (error) {
                addLog(`배치 중단 중 오류: ${error.message}`, 'error');
            }
        }

        // 배치 재시작
        async function resumeBatch() {
            const consonant = document.getElementById('resumeConsonant').value;
            const vowel = document.getElementById('resumeVowel').value;
            
            try {
                addLog(`배치 재시작 요청: ${consonant}${vowel}부터...`, 'info');
                
                const response = await fetch(`/K-CrossWord/api/consonant-vowel-batch/resume-from?startConsonant=${consonant}&startVowel=${vowel}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    addLog(`배치가 ${consonant}${vowel}부터 재시작되었습니다.`, 'success');
                    isRunning = true;
                    updateButtonStates();
                } else {
                    addLog(`배치 재시작 실패: ${result.message}`, 'error');
                }
            } catch (error) {
                addLog(`배치 재시작 중 오류: ${error.message}`, 'error');
            }
        }

        // 단일 조합 테스트
        async function testCombination() {
            const consonant = document.getElementById('resumeConsonant').value;
            const vowel = document.getElementById('resumeVowel').value;
            
            try {
                addLog(`단일 조합 테스트: ${consonant}${vowel}...`, 'info');
                
                const response = await fetch(`/K-CrossWord/api/consonant-vowel-batch/process-combination?consonant=${consonant}&vowel=${vowel}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    addLog(`테스트 성공: ${result.generated_count}개 단어 생성, ${result.saved_count}개 저장`, 'success');
                } else {
                    addLog(`테스트 실패: ${result.message}`, 'error');
                }
            } catch (error) {
                addLog(`테스트 중 오류: ${error.message}`, 'error');
            }
        }

        // 상태 업데이트
        async function updateStatus() {
            try {
                const response = await fetch('/K-CrossWord/api/consonant-vowel-batch/status');
                const status = await response.json();
                
                // 배치 상태 업데이트
                document.getElementById('batchStatus').textContent = 
                    status.isRunning ? '실행 중' : '대기 중';
                
                // 진행률 업데이트
                const processed = status.processedCount || 0;
                const total = status.totalCombinations || 196;
                const progress = total > 0 ? (processed / total * 100).toFixed(1) : 0;
                
                document.getElementById('progress').textContent = `${progress}%`;
                document.getElementById('progressText').textContent = `${processed} / ${total}`;
                document.getElementById('progressBar').style.width = `${progress}%`;
                
                // 성공/실패 카운트
                document.getElementById('successCount').textContent = status.successCount || 0;
                document.getElementById('failureCount').textContent = status.failureCount || 0;
                
                // 현재 조합
                document.getElementById('currentCombination').textContent = 
                    status.currentCombination || '-';
                
                // 조합 그리드 업데이트
                updateCombinationGrid(status);
                
                // 버튼 상태 업데이트
                isRunning = status.isRunning || false;
                updateButtonStates();
                
            } catch (error) {
                console.error('상태 업데이트 중 오류:', error);
            }
        }

        // 조합 그리드 업데이트
        function updateCombinationGrid(status) {
            const processed = status.processedCount || 0;
            const current = status.currentCombination || '';
            
            consonants.forEach((consonant, cIndex) => {
                vowels.forEach((vowel, vIndex) => {
                    const cellId = `cell-${consonant}-${vowel}`;
                    const cell = document.getElementById(cellId);
                    const combinationIndex = cIndex * vowels.length + vIndex;
                    
                    if (combinationIndex < processed) {
                        cell.className = 'combination-cell processed';
                    } else if (`${consonant}${vowel}` === current) {
                        cell.className = 'combination-cell current';
                    } else {
                        cell.className = 'combination-cell pending';
                    }
                });
            });
        }

        // 버튼 상태 업데이트
        function updateButtonStates() {
            const startBtn = document.getElementById('startBatchBtn');
            const stopBtn = document.getElementById('stopBatchBtn');
            
            if (isRunning) {
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        // 로그 추가
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 로그 지우기
        function clearLog() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '<div class="log-entry log-info">로그가 지워졌습니다.</div>';
        }
    </script>
</body>
</html>
