<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수동 퍼즐 목록</title>
    <link rel="icon" type="image/x-icon" href="/K-CrossWord/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 1.5rem 0; margin-bottom: 2rem;
        }
        .card-container { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .puzzle-row { transition: background-color 0.2s; }
        .puzzle-row:hover { background-color: #f0f4ff; }
        .badge-active { background-color: #28a745; }
        .badge-inactive { background-color: #dc3545; }
        .btn-action { font-size: 12px; padding: 2px 8px; }
        .stats-bar .stat-item {
            display: inline-block; padding: 0.5rem 1.2rem;
            background: #f0f4ff; border-radius: 8px; margin-right: 0.5rem; font-size: 14px;
        }
        .stats-bar .stat-item strong { color: #667eea; }
        .stat-cell { font-size: 12px; }
        .stat-cell .stat-icon { color: #667eea; margin-right: 2px; }
        .stat-cell .stat-value { font-weight: 600; }
        .stat-cell .stat-label { color: #999; font-size: 10px; }
        .no-data { color: #ccc; font-size: 11px; }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h4 class="mb-0"><i class="fas fa-list me-2"></i>수동 퍼즐 목록</h4>
                    <p class="mb-0 mt-1 opacity-75 small">수동으로 생성된 퍼즐 관리</p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/admin/" class="btn btn-light btn-sm me-1"><i class="fas fa-home me-1"></i>관리자 메인</a>
                    <a href="/K-CrossWord/admin/manual-puzzle" class="btn btn-warning btn-sm"><i class="fas fa-plus me-1"></i>새 퍼즐 생성</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card-container">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div class="stats-bar">
                    <span class="stat-item"><strong id="totalCount">0</strong> 전체</span>
                    <span class="stat-item"><strong id="activeCount">0</strong> 활성</span>
                    <span class="stat-item"><strong id="inactiveCount">0</strong> 비활성</span>
                </div>
                <div>
                    <select class="form-select form-select-sm d-inline-block" id="filterSelect" style="width: 150px;" onchange="loadPuzzles()">
                        <option value="all">전체 보기</option>
                        <option value="active" selected>활성만</option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary ms-1" onclick="loadPuzzles()"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-sm align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width:40px;">#</th>
                            <th>제목</th>
                            <th style="width:90px;">Puzzle ID</th>
                            <th style="width:60px;" class="text-center">단어</th>
                            <th style="width:170px;" class="text-center">통계</th>
                            <th style="width:90px;">생성일</th>
                            <th style="width:60px;">상태</th>
                            <th style="width:220px;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="puzzleTableBody">
                        <tr><td colspan="8" class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const API = '/K-CrossWord/admin/api/manual-puzzle';

    function formatTime(seconds) {
        if (seconds == null) return '-';
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m > 0 ? m + '분 ' + s + '초' : s + '초';
    }

    function loadPuzzles() {
        const filter = document.getElementById('filterSelect').value;
        fetch(API + '/list?filter=' + filter)
            .then(r => r.json())
            .then(data => {
                if (!data.success) { alert('목록 조회 실패: ' + (data.message || '')); return; }
                const puzzles = data.puzzles || [];
                const tbody = document.getElementById('puzzleTableBody');

                const activeCount = puzzles.filter(p => p.isActive).length;
                const inactiveCount = puzzles.filter(p => !p.isActive).length;
                document.getElementById('totalCount').textContent = puzzles.length;
                document.getElementById('activeCount').textContent = activeCount;
                document.getElementById('inactiveCount').textContent = inactiveCount;

                if (puzzles.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>수동 퍼즐이 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = puzzles.map((p, i) => {
                    const date = p.createdAt ? p.createdAt.substring(0, 10) : p.puzzleDate || '-';
                    const statusBadge = p.isActive
                        ? '<span class="badge badge-active">활성</span>'
                        : '<span class="badge badge-inactive">비활성</span>';
                    const toggleBtn = p.isActive
                        ? `<button class="btn btn-outline-danger btn-action" onclick="deactivatePuzzle(${p.id}, '${escapeHtml(p.title)}')"><i class="fas fa-trash-alt me-1"></i>삭제</button>`
                        : `<button class="btn btn-outline-success btn-action" onclick="activatePuzzle(${p.id})"><i class="fas fa-undo me-1"></i>복원</button>`;
                    const editUrl = p.templateId
                        ? `/K-CrossWord/admin/manual-puzzle?templateId=${p.templateId}`
                        : `/K-CrossWord/admin/manual-puzzle`;
                    const gameUrl = `/K-CrossWord/manual-game?puzzleId=${p.puzzleId}`;

                    let statsHtml;
                    if (p.participantCount > 0) {
                        statsHtml = `<div class="stat-cell">
                            <span title="참여자"><i class="fas fa-users stat-icon"></i><span class="stat-value">${p.participantCount}</span><span class="stat-label">명</span></span>
                            <span class="ms-2" title="평균 완료시간"><i class="fas fa-clock stat-icon"></i><span class="stat-value">${formatTime(p.avgCompletionTime)}</span></span>
                            <span class="ms-2" title="최고 기록"><i class="fas fa-trophy stat-icon" style="color:#f39c12;"></i><span class="stat-value">${formatTime(p.bestTime)}</span></span>
                        </div>`;
                    } else {
                        statsHtml = '<span class="no-data">참여 없음</span>';
                    }

                    return `<tr class="puzzle-row">
                        <td class="text-muted">${i + 1}</td>
                        <td><strong>${escapeHtml(p.title)}</strong></td>
                        <td><code class="small">${p.puzzleId}</code></td>
                        <td class="text-center"><span class="badge bg-primary">${p.wordCount}</span></td>
                        <td class="text-center">${statsHtml}</td>
                        <td class="small">${date}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <a href="${gameUrl}" target="_blank" class="btn btn-outline-primary btn-action"><i class="fas fa-gamepad me-1"></i>게임</a>
                            <a href="${editUrl}" class="btn btn-outline-warning btn-action"><i class="fas fa-edit me-1"></i>수정</a>
                            ${toggleBtn}
                        </td>
                    </tr>`;
                }).join('');
            })
            .catch(err => {
                document.getElementById('puzzleTableBody').innerHTML =
                    `<tr><td colspan="8" class="text-center text-danger py-4">로드 오류: ${err.message}</td></tr>`;
            });
    }

    function deactivatePuzzle(id, title) {
        if (!confirm(`"${title}" 퍼즐을 삭제(비활성화)하시겠습니까?`)) return;
        fetch(API + '/' + id + '/deactivate', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) { loadPuzzles(); }
                else { alert('삭제 실패: ' + (data.message || '')); }
            })
            .catch(err => alert('삭제 오류: ' + err.message));
    }

    function activatePuzzle(id) {
        if (!confirm('이 퍼즐을 다시 활성화하시겠습니까?')) return;
        fetch(API + '/' + id + '/activate', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) { loadPuzzles(); }
                else { alert('활성화 실패: ' + (data.message || '')); }
            })
            .catch(err => alert('활성화 오류: ' + err.message));
    }

    function escapeHtml(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadPuzzles);
    </script>
</body>
</html>
