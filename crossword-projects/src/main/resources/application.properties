# 서버 설정
server.port=8081
server.servlet.context-path=/K-CrossWord

# 애플리케이션 정보
spring.application.name=crossword-puzzle-system
spring.profiles.active=dev
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# 공개 URL (nginx 동일 호스트 프록시 시 로그인/로그아웃 리다이렉트에 사용, 끝에 / 없음)
app.public.base-url=https://k-crossword.com

# nginx 리버스 프록시 뒤에서 X-Forwarded-* 반영 (HTTPS·세션 쿠키)
server.forward-headers-strategy=framework

# 데이터베이스 설정 (PostgreSQL) — 비밀번호는 .env 의 NATUS_DB_PASSWORD
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/natus_db
spring.datasource.username=natus_user
spring.datasource.password=${NATUS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Redis 설정
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.database=0
spring.redis.password=
spring.redis.timeout=2000ms

# Lettuce 연결 풀 설정
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=2000ms

# Spring Session 설정 (8080 포트 게시판과 동일한 네임스페이스 사용)
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.redis.flush-mode=on_save
spring.session.timeout=1800s
# 쿠키 도메인 설정 (게시판 8080과 크로스워드 8081 동일 도메인에서 세션 공유)
server.servlet.session.cookie.domain=k-crossword.com
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
# HTTPS(nginx) 뒤에서 서비스할 때 true 권장
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.name=JSESSIONID

# Redis 설정 강제 적용
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0

# Thymeleaf 설정
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# 정적 리소스 설정
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.web.resources.add-mappings=true
spring.web.resources.cache.period=0

# 로깅 설정
logging.level.com.example.crossword=DEBUG
logging.level.com.example.crossword.controller=DEBUG
logging.level.com.example.crossword.service=DEBUG
logging.level.com.example.crossword.repository=DEBUG
logging.level.org.springframework.session=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# 로그 파일 경로·일별 롤링·5일 보관은 logback-spring.xml (/home/ubuntu/crossword/log)
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# JSON 설정
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Seoul

# @Scheduled 기본 스케줄러 타임존 (cron·주기 작업 해석)
spring.task.scheduling.time-zone=Asia/Seoul

# 개발 도구 설정
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.restart.additional-paths=src/main/resources/static

# 보안 설정 (개발용)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Spring Security 설정은 SecurityConfig.java에서 관리

# Gemini API 설정
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}

# JPA/Hibernate 로깅 설정 (퍼즐 생성 쿼리 분석용)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.data.jpa=DEBUG
logging.level.com.example.crossword.service=DEBUG
logging.level.com.example.crossword.repository=DEBUG
