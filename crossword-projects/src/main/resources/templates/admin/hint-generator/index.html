<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 힌트 생성 관리</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">AI 힌트 생성 관리</h4>
                    </div>
                    <div class="card-body">
                        <h5>힌트생성 관리 페이지</h5>
                        <p class="text-muted">현재 상태: 전체</p>
                        
                        <!-- 필터 및 검색 -->
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <select id="hintFilter" class="form-select" onchange="loadWordsTable()">
                                    <option value="">전체</option>
                                    <option value="with_hints">힌트 보유</option>
                                    <option value="without_hints">힌트 없음</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="text" id="searchInput" class="form-control" placeholder="단어 또는 카테고리 검색..." onkeyup="handleSearch()">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-outline-secondary" onclick="clearSearch()">초기화</button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary" onclick="testAPI()">API 테스트</button>
                            </div>
                        </div>
                        
                        <!-- 단어 목록 테이블 -->
                        <div class="table-responsive">
                            <table id="wordsDataTable" class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>선택</th>
                                        <th>카테고리</th>
                                        <th>단어</th>
                                        <th>글자수</th>
                                        <th>난이도</th>
                                        <th>힌트 개수</th>
                                        <th>관리</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Ajax로 데이터 로드 -->
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-3">
                            <button type="button" class="btn btn-primary me-2" onclick="testAPI()">
                                <i class="fas fa-wifi"></i> API 테스트
                            </button>
                            <button type="button" class="btn btn-success" onclick="loadStats()">
                                <i class="fas fa-chart-bar"></i> 통계 새로고침
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 힌트 보기 모달 -->
    <div class="modal fade" id="hintsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">힌트 목록</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="hintsList">
                        <!-- 힌트 목록이 여기에 표시됩니다 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-warning" id="regenerateAllHints">
                        <i class="fas fa-redo"></i> 모든 힌트 재생성
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 페이지 로드 시 통계 로드
        $(document).ready(function() {
            loadStats();
            loadWordsTable();
        });

        // 통계 정보 로드
        function loadStats() {
            fetch('/K-CrossWord/admin/api/hint-generator/stats')
                .then(response => response.json())
                .then(data => {
                    if (data.total_words !== undefined) {
                        document.getElementById('totalWords').textContent = data.total_words;
                        document.getElementById('wordsWithHints').textContent = data.words_with_hints;
                        document.getElementById('wordsWithoutHints').textContent = data.words_without_hints;
                        document.getElementById('totalHints').textContent = data.total_hints;
                    }
                })
                .catch(error => {
                    console.error('통계 로드 실패:', error);
                });
        }

        // DataTables 초기화
        let wordsTable;
        
        function initializeDataTable() {
            wordsTable = $('#wordsDataTable').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/K-CrossWord/admin/api/hint-generator/words-ajax',
                    type: 'GET',
                    data: function(d) {
                        // DataTables 파라미터를 서버에 전달
                        return {
                            draw: d.draw,
                            start: d.start,
                            length: d.length,
                            search: $('#searchInput').val() || '', // 사용자 입력 검색어 사용
                            orderColumn: d.order[0].column,
                            orderDir: d.order[0].dir,
                            status: $('#hintFilter').val() || ''
                        };
                    }
                },
                columns: [
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return `<input type="checkbox" class="word-checkbox" value="${row.id}" onchange="updateSelectedWords()">`;
                        }
                    },
                    { data: 'category' },
                    { 
                        data: 'word',
                        render: function(data, type, row) {
                            return `<strong>${data}</strong>`;
                        }
                    },
                    { data: 'length' },
                    { 
                        data: 'difficulty_text',
                        render: function(data, type, row) {
                            const difficultyClass = getDifficultyClass(row.difficulty);
                            return `<span class="badge ${difficultyClass}">${data}</span>`;
                        }
                    },
                    { 
                        data: 'hints_count',
                        render: function(data, type, row) {
                            const count = data || 0;
                            const badgeClass = count > 0 ? 'bg-success' : 'bg-secondary';
                            return `<span class="badge ${badgeClass}">${count}개</span>`;
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return `
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="viewHints(${row.id})" title="힌트 보기">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-success" onclick="regenerateHint(${row.id})" title="재생성">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                            `;
                        }
                    }
                ],
                order: [[6, 'desc']], // 힌트 개수 내림차순
                pageLength: 25,
                lengthMenu: [[10, 25, 50, 100], [10, 25, 50, 100]],
                language: {
                    processing: "처리중...",
                    lengthMenu: "_MENU_ 개씩 보기",
                    zeroRecords: "데이터가 없습니다.",
                    info: "_START_ - _END_ / _TOTAL_",
                    infoEmpty: "0 - 0 / 0",
                    infoFiltered: "(전체 _MAX_ 개 중 검색결과)",
                    search: "검색:",
                    paginate: {
                        first: "처음",
                        last: "마지막",
                        next: "다음",
                        previous: "이전"
                    }
                }
            });
        }
        
        // 단어 테이블 로드 (DataTables 사용)
        function loadWordsTable() {
            if (wordsTable) {
                wordsTable.ajax.reload();
            } else {
                initializeDataTable();
            }
        }
        
        // 검색 처리 (디바운싱 적용)
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (wordsTable) {
                    wordsTable.ajax.reload();
                }
            }, 500); // 500ms 지연
        }
        
        // 검색 초기화
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('hintFilter').value = '';
            if (wordsTable) {
                wordsTable.ajax.reload();
            }
        }
        
        // 난이도별 CSS 클래스 반환
        function getDifficultyClass(difficulty) {
            switch(difficulty) {
                case 1: return 'bg-success';
                case 2: return 'bg-warning';
                case 3: return 'bg-danger';
                case 4: return 'bg-dark';
                case 5: return 'bg-secondary';
                default: return 'bg-secondary';
            }
        }
        
        // 선택된 단어 업데이트
        function updateSelectedWords() {
            const checkboxes = document.querySelectorAll('.word-checkbox:checked');
            const selectedCount = document.getElementById('selectedCount');
            if (selectedCount) {
                selectedCount.textContent = checkboxes.length;
            }
        }


        // API 테스트
        function testAPI() {
            fetch('/K-CrossWord/admin/api/hint-generator/test')
                .then(response => response.json())
                .then(data => {
                    alert('API 테스트 성공: ' + data.message);
                })
                .catch(error => {
                    alert('API 테스트 실패: ' + error.message);
                });
        }

        // 힌트 생성
        function generateHint(wordId) {
            if (confirm('이 단어에 대한 힌트를 생성하시겠습니까?')) {
                fetch(`/K-CrossWord/admin/api/hint-generator/word/${wordId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('힌트 생성 성공: ' + data.message);
                        loadStats();
                        loadWordsTable();
                    } else {
                        alert('힌트 생성 실패: ' + data.message);
                    }
                })
                .catch(error => {
                    alert('힌트 생성 중 오류가 발생했습니다: ' + error.message);
                });
            }
        }

        // 힌트 보기
        function viewHints(wordId) {
            fetch(`/K-CrossWord/admin/api/hint-generator/word/${wordId}/hints`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.hints && data.hints.length > 0) {
                        showHintsModal(data.hints, wordId);
                    } else {
                        showAlert('info', '이 단어에는 아직 힌트가 없습니다.');
                    }
                })
                .catch(error => {
                    console.error('힌트 로드 실패:', error);
                    showAlert('error', '힌트를 불러오는 중 오류가 발생했습니다.');
                });
        }

        // 힌트 재생성
        function regenerateHint(wordId) {
            if (confirm('기존 힌트를 삭제하고 새로 생성하시겠습니까?')) {
                // 기존 힌트 삭제 후 새로 생성
                fetch(`/K-CrossWord/admin/api/hint-generator/word/${wordId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ overwrite: true })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', data.message);
                        loadStats();
                        loadWordsTable();
                    } else {
                        showAlert('error', data.message);
                    }
                })
                .catch(error => {
                    console.error('힌트 재생성 실패:', error);
                    showAlert('error', '힌트 재생성 중 오류가 발생했습니다.');
                });
            }
        }

        // 힌트 모달 표시
        function showHintsModal(hints, wordId) {
            const hintsList = document.getElementById('hintsList');
            hintsList.innerHTML = '';
            
            hints.forEach((hint, index) => {
                const hintCard = document.createElement('div');
                hintCard.className = 'card mb-3';
                
                const badgeColor = getDifficultyBadgeColor(hint.difficulty);
                const difficultyText = getDifficultyText(hint.difficulty);
                
                hintCard.innerHTML = `
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <h6 class="card-title">
                                    <span class="badge ${badgeColor} me-2">${difficultyText}</span>
                                    힌트 ${index + 1}
                                </h6>
                                <p class="card-text">${hint.hint_text}</p>
                                <small class="text-muted">
                                    생성일: ${new Date(hint.created_at).toLocaleString()}
                                </small>
                            </div>
                            <div class="ms-3">
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteHint(${hint.id}, ${wordId})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                hintsList.appendChild(hintCard);
            });
            
            // 모달의 재생성 버튼 이벤트 연결
            document.getElementById('regenerateAllHints').onclick = function() {
                regenerateHint(wordId);
                bootstrap.Modal.getInstance(document.getElementById('hintsModal')).hide();
            };
            
            // 모달 표시
            new bootstrap.Modal(document.getElementById('hintsModal')).show();
        }

        // 난이도에 따른 배지 색상 반환
        function getDifficultyBadgeColor(difficulty) {
            switch(difficulty) {
                case 1: return 'bg-success';
                case 2: return 'bg-primary';
                case 3: return 'bg-warning';
                case 4: return 'bg-danger';
                case 5: return 'bg-dark';
                default: return 'bg-secondary';
            }
        }

        // 난이도에 따른 텍스트 반환
        function getDifficultyText(difficulty) {
            switch(difficulty) {
                case 1: return '쉬움';
                case 2: return '보통';
                case 3: return '어려움';
                case 4: return '매우 어려움';
                case 5: return '극도 어려움';
                default: return '알 수 없음';
            }
        }

        // 개별 힌트 삭제
        function deleteHint(hintId, wordId) {
            if (confirm('이 힌트를 삭제하시겠습니까?')) {
                fetch(`/K-CrossWord/admin/api/hint-generator/hint/${hintId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', '힌트가 삭제되었습니다.');
                        // 모달 새로고침
                        viewHints(wordId);
                        // 테이블 새로고침
                        loadStats();
                        loadWordsTable();
                    } else {
                        showAlert('error', data.message);
                    }
                })
                .catch(error => {
                    console.error('힌트 삭제 실패:', error);
                    showAlert('error', '힌트 삭제 중 오류가 발생했습니다.');
                });
            }
        }

        // 알림 표시
        function showAlert(type, message) {
            const alertClass = type === 'success' ? 'alert-success' : 
                              type === 'warning' ? 'alert-warning' : 
                              type === 'error' ? 'alert-danger' : 'alert-info';
            
            const alertHtml = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            // 페이지 상단에 알림 추가
            const container = document.querySelector('.container-fluid');
            container.insertAdjacentHTML('afterbegin', alertHtml);
            
            // 5초 후 자동 제거
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }
    </script>
</body>
</html>
