# k-crossword.com — 게시판(8080) + 크로스워드(8081)
# 설치: sudo cp ... /etc/nginx/sites-available/k-crossword.com
#       sudo ln -sf /etc/nginx/sites-available/k-crossword.com /etc/nginx/sites-enabled/
#       sudo rm -f /etc/nginx/sites-enabled/default
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name k-crossword.com www.k-crossword.com;

    client_max_body_size 50m;

    location /K-CrossWord/ {
        proxy_pass http://127.0.0.1:8081/K-CrossWord/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
