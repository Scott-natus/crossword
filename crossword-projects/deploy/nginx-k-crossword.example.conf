# =============================================================================
# k-crossword.com — HTTPS + 게시판(8080) + 크로스워드(8081)
# =============================================================================
# 1) 복사 후 활성화:
#    sudo cp nginx-k-crossword.example.conf /etc/nginx/sites-available/k-crossword.com
#    sudo ln -sf /etc/nginx/sites-available/k-crossword.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
# 2) Let's Encrypt (도메인 A레코드가 이 서버 IP를 가리켜야 함)
#    sudo apt install -y certbot python3-certbot-nginx
#    아래 ssl_certificate 주석을 해제하거나, certbot으로 자동 삽입:
#    sudo certbot --nginx -d k-crossword.com -d www.k-crossword.com
#
# 3) 방화벽: 80, 443 (예: sudo ufw allow 'Nginx Full')
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name k-crossword.com www.k-crossword.com;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        return 301 https://k-crossword.com$request_uri;
    }
}

# www → apex (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.k-crossword.com;

    # ssl_certificate /etc/letsencrypt/live/k-crossword.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/k-crossword.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://k-crossword.com$request_uri;
}

# 메인 (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name k-crossword.com;

    # ssl_certificate /etc/letsencrypt/live/k-crossword.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/k-crossword.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location /K-CrossWord/ {
        proxy_pass http://127.0.0.1:8081/K-CrossWord/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
