# 서버 설정
server.port=8081
server.servlet.context-path=/K-CrossWord

# 애플리케이션 정보
spring.application.name=crossword-puzzle-system
spring.profiles.active=dev

# 데이터베이스 설정 (PostgreSQL)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/mydb
spring.datasource.username=myuser
spring.datasource.password=tngkrrhk
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Redis 설정
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.database=0
spring.redis.password=
spring.redis.timeout=2000ms

# Lettuce 연결 풀 설정
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=2000ms

# Spring Session 설정
spring.session.store-type=redis
spring.session.redis.namespace=crossword:session
spring.session.redis.flush-mode=on_save
spring.session.timeout=1800s

# Thymeleaf 설정
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# 정적 리소스 설정
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.web.resources.add-mappings=true
spring.web.resources.cache.cachecontrol.max-age=0

# 로깅 설정
logging.level.com.example.crossword=DEBUG
logging.level.org.springframework.session=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JSON 설정
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Seoul

# 개발 도구 설정
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# 보안 설정 (개발용)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Spring Security 설정은 SecurityConfig.java에서 관리
