<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그리드 템플릿 관리 - 퍼즐 관리 시스템</title>
    <link rel="icon" type="image/x-icon" href="/K-CrossWord/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .admin-header {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        .card-header {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            border: none;
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            border: none;
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .nav-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            background-color: #e9ecef;
            color: #495057;
        }
        .nav-link.active {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <div class="admin-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-0">
                        <i class="fas fa-th me-3"></i>그리드 템플릿 관리
                    </h1>
                    <p class="mb-0 mt-2">퍼즐 그리드 패턴 및 템플릿 관리</p>
                </div>
                <div class="col-md-4 text-end">
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="/K-CrossWord/admin/" class="btn btn-outline-light">
                            <i class="fas fa-home"></i> 관리자 홈
                        </a>
                        <a href="/K-CrossWord/admin/words" class="btn btn-outline-light">
                            <i class="fas fa-list"></i> 단어 관리
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 네비게이션 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 text-primary">
                        <i class="fas fa-puzzle-piece me-2"></i>퍼즐 관리 바로가기
                    </h6>
                    <div class="d-flex gap-2">
                        <a href="/K-CrossWord/admin/words" class="btn btn-primary btn-sm">
                            <i class="fas fa-list me-1"></i>단어 관리
                        </a>
                        <a href="/K-CrossWord/admin/hint-generator" class="btn btn-info btn-sm">
                            <i class="fas fa-magic me-1"></i>AI 힌트 생성
                        </a>
                        <a href="/K-CrossWord/admin/levels" class="btn btn-success btn-sm">
                            <i class="fas fa-layer-group me-1"></i>레벨 관리
                        </a>
                        <a href="/K-CrossWord/admin/grid-templates" class="btn btn-warning btn-sm active">
                            <i class="fas fa-th me-1"></i>그리드 템플릿관리
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 그리드 템플릿 관리 메인 컨텐츠 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">
                            <i class="fas fa-th me-2"></i>그리드 템플릿 관리
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <strong>그리드 템플릿 관리 기능</strong><br>
                            크로스워드 퍼즐의 그리드 패턴과 템플릿을 생성하고 관리합니다.
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="card border-warning">
                                    <div class="card-header bg-warning text-white">
                                        <h5 class="mb-0">
                                            <i class="fas fa-plus me-2"></i>템플릿 생성
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <p>새로운 그리드 템플릿을 생성합니다.</p>
                                        <button class="btn btn-warning" disabled>
                                            <i class="fas fa-plus me-2"></i>템플릿 생성
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-4">
                                <div class="card border-primary">
                                    <div class="card-header bg-primary text-white">
                                        <h5 class="mb-0">
                                            <i class="fas fa-edit me-2"></i>템플릿 수정
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <p>기존 템플릿을 수정합니다.</p>
                                        <button class="btn btn-primary" disabled>
                                            <i class="fas fa-edit me-2"></i>템플릿 수정
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-4">
                                <div class="card border-success">
                                    <div class="card-header bg-success text-white">
                                        <h5 class="mb-0">
                                            <i class="fas fa-eye me-2"></i>템플릿 미리보기
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <p>그리드 템플릿을 미리보기합니다.</p>
                                        <button class="btn btn-success" disabled>
                                            <i class="fas fa-eye me-2"></i>미리보기
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <div class="alert alert-warning">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <strong>개발 중</strong><br>
                                그리드 템플릿 관리 기능은 현재 개발 중입니다. 곧 사용할 수 있도록 준비하겠습니다.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
