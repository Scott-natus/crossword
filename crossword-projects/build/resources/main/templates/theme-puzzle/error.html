<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼즐 오류</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .error-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        
        .error-title {
            color: #333;
            margin-bottom: 1rem;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .btn-retry {
            background: #007bff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            margin: 0.5rem;
        }
        
        .btn-retry:hover {
            background: #0056b3;
            color: white;
        }
        
        .btn-home {
            background: #6c757d;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            margin: 0.5rem;
        }
        
        .btn-home:hover {
            background: #545b62;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">⚠️</div>
            <h2 class="error-title">퍼즐을 불러올 수 없습니다</h2>
            <p class="error-message" th:text="${error}">오류가 발생했습니다.</p>
            
            <div class="mt-4">
                <a href="javascript:history.back()" class="btn-retry">다시 시도</a>
                <a href="/K-CrossWord" class="btn-home">홈으로</a>
            </div>
            
            <div class="mt-4">
                <h6>다른 테마를 시도해보세요</h6>
                <div class="d-flex gap-2 justify-content-center flex-wrap">
                    <a href="/K-CrossWord/K-POP" class="btn btn-outline-primary btn-sm">K-POP</a>
                    <a href="/K-CrossWord/K-DRAMA" class="btn btn-outline-primary btn-sm">K-DRAMA</a>
                    <a href="/K-CrossWord/K-MOVIE" class="btn btn-outline-primary btn-sm">K-MOVIE</a>
                    <a href="/K-CrossWord/K-CULTURE" class="btn btn-outline-primary btn-sm">K-CULTURE</a>
                    <a href="/K-CrossWord/Korean" class="btn btn-outline-primary btn-sm">Korean</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
