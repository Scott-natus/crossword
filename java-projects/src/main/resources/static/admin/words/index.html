<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 관리 - 크로스워드 퍼즐 관리자</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        
        .stats-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        
        .stats-card:hover {
            transform: translateY(-2px);
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stats-label {
            color: #6c757d;
            font-size: 0.9rem;
        }

        /* 힌트 보기 모달 스타일 */
        .hint-result-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .hint-result-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }

        .hint-result-item.primary {
            border-left: 4px solid #007bff;
            background-color: #f8f9ff;
        }

        .hint-difficulty-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
        }

        .hint-content {
            font-size: 1.1rem;
            font-weight: 500;
            color: #495057;
            margin-top: 8px;
        }

        .word-info {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        
        .admin-nav {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .nav-item {
            margin-bottom: 1rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 8px;
            text-decoration: none;
            color: #495057;
            transition: all 0.2s;
            border: 1px solid #e9ecef;
        }
        
        .nav-link:hover {
            background-color: #f8f9fa;
            border-color: #667eea;
            color: #667eea;
            transform: translateX(5px);
        }
        
        .nav-link i {
            font-size: 1.5rem;
            margin-right: 1rem;
            width: 30px;
            text-align: center;
        }
        
        .data-table-container {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .table th {
            background-color: #f8f9fa;
            border-top: none;
            font-weight: 600;
            color: #495057;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6a4190 100%);
        }
        
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .alert {
            border-radius: 8px;
        }
        
        .badge {
            font-size: 0.8rem;
        }
        
        .difficulty-easy { background-color: #28a745; }
        .difficulty-medium { background-color: #ffc107; color: #212529; }
        .difficulty-hard { background-color: #fd7e14; }
        .difficulty-very-hard { background-color: #dc3545; }
        .difficulty-extreme { background-color: #6f42c1; }

        /* 정제 모달 스타일 */
        .hint-field {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .hint-field:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .hint-field.primary {
            border-left: 4px solid #007bff;
            background-color: #f8f9ff;
        }

        .hint-field .form-control {
            border: 1px solid #ced4da;
        }

        .hint-field .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }

        .hint-field .form-select {
            border: 1px solid #ced4da;
        }

        .hint-field .form-select:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }

        .primary-checkbox {
            margin-top: 8px;
        }

        .remove-hint-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            border: none;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .remove-hint-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <!-- 관리자 헤더 -->
    <div class="admin-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1><i class="fas fa-list me-3"></i>단어 관리</h1>
                    <p class="mb-0">크로스워드 퍼즐 단어를 관리하고 힌트를 생성할 수 있습니다.</p>
                </div>
                <div class="col-md-4 text-end">
                </div>
            </div>
        </div>
    </div>

    <!-- 퍼즐 관리 네비게이션 -->
    <div class="container mb-4">
        <div class="card">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 text-primary">
                        <i class="fas fa-puzzle-piece me-2"></i>퍼즐 관리 바로가기
                    </h6>
                    <div class="d-flex gap-2">
                        <a href="/admin/" class="btn btn-secondary btn-sm">
                            <i class="fas fa-home me-1"></i>퍼즐관리
                        </a>
                        <a href="/admin/words" class="btn btn-primary btn-sm">
                            <i class="fas fa-list me-1"></i>단어관리
                        </a>
                        <a href="/admin/hint-generator" class="btn btn-info btn-sm">
                            <i class="fas fa-magic me-1"></i>AI 힌트관리
                        </a>
                        <a href="/admin/levels" class="btn btn-success btn-sm">
                            <i class="fas fa-layer-group me-1"></i>레벨관리
                        </a>
                        <a href="/admin/templates" class="btn btn-warning btn-sm">
                            <i class="fas fa-th me-1"></i>그리드 템플릿관리
                        </a>
                        <a href="/admin/templates/create" class="btn btn-outline-warning btn-sm">
                            <i class="fas fa-plus me-1"></i>템플릿 생성
                        </a>
                        <a href="/admin/users" class="btn btn-danger btn-sm">
                            <i class="fas fa-users me-1"></i>사용자관리
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 통계 정보 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="activeWords">0</div>
                    <div class="stats-label">활성 단어</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="refinedWords">0</div>
                    <div class="stats-label">정제완료</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="wordsWithoutHints">0</div>
                    <div class="stats-label">힌트미보유</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="totalHints">0</div>
                    <div class="stats-label">전체 힌트</div>
                </div>
            </div>
        </div>

        <!-- 단어 관리 컨트롤 -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="data-table-container">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4><i class="fas fa-puzzle-piece me-2"></i>크로스워드 퍼즐 단어 관리</h4>
                        <div>
                            <button class="btn btn-success me-2" onclick="openAddWordModal()">
                                <i class="fas fa-plus me-1"></i>단어 추가
                            </button>
                            <button class="btn btn-warning" onclick="openBatchUpdateModal()">
                                <i class="fas fa-edit me-1"></i>일괄변경
                            </button>
                        </div>
                    </div>

                    <!-- 검색 및 필터 -->
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <div class="input-group">
                                <input type="text" class="form-control" id="keywordSearch" placeholder="단어 검색...">
                                <button class="btn btn-outline-secondary" type="button" onclick="performSearch()">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="difficultyFilter" onchange="performSearch()">
                                <option value="">전체 난이도</option>
                                <option value="1">쉬움</option>
                                <option value="2">보통</option>
                                <option value="3">어려움</option>
                                <option value="4">매우 어려움</option>
                                <option value="5">극도 어려움</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="refinementFilter" onchange="performSearch()">
                                <option value="">전체 정제상태</option>
                                <option value="Y">정제완료</option>
                                <option value="N">정제대기</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="activeFilter" onchange="performSearch()">
                                <option value="">전체 사용여부</option>
                                <option value="true">활성화</option>
                                <option value="false">비활성화</option>
                            </select>
                        </div>
                    </div>

                    <!-- DataTables -->
                    <div class="table-responsive">
                        <table id="wordsDataTable" class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="50">
                                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                    </th>
                                    <th>카테고리</th>
                                    <th>단어</th>
                                    <th>글자수</th>
                                    <th>난이도</th>
                                    <th>힌트 개수</th>
                                    <th>사용여부</th>
                                    <th>정제여부</th>
                                    <th>입력일자</th>
                                    <th width="120">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- DataTables로 동적 로드 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 단어 추가 모달 -->
    <div class="modal fade" id="addWordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus me-2"></i>단어 추가</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addWordForm">
                        <div class="mb-3">
                            <label for="wordCategory" class="form-label">카테고리</label>
                            <input type="text" class="form-control" id="wordCategory" placeholder="카테고리를 입력하세요. (최대 50자)" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="wordText" class="form-label">단어</label>
                            <input type="text" class="form-control" id="wordText" placeholder="단어를 입력하세요. (최대 255자)" maxlength="255">
                        </div>
                        <div class="mb-3">
                            <label for="wordDifficulty" class="form-label">난이도</label>
                            <select class="form-select" id="wordDifficulty">
                                <option value="">난이도 선택</option>
                                <option value="1">쉬움</option>
                                <option value="2">보통</option>
                                <option value="3">어려움</option>
                                <option value="4">매우 어려움</option>
                                <option value="5">극도 어려움</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="addWord()">입력</button>
                </div>
            </div>
        </div>
    </div>


    <!-- 단어 수정 모달 -->
    <div class="modal fade" id="editWordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>단어 수정</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editWordForm">
                        <input type="hidden" id="editWordId">
                        <div class="mb-3">
                            <label for="editWordCategory" class="form-label">카테고리</label>
                            <input type="text" class="form-control" id="editWordCategory" placeholder="카테고리를 입력하세요. (최대 50자)" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="editWordText" class="form-label">단어</label>
                            <input type="text" class="form-control" id="editWordText" placeholder="단어를 입력하세요. (최대 255자)" maxlength="255">
                        </div>
                        <div class="mb-3">
                            <label for="editWordDifficulty" class="form-label">난이도</label>
                            <select class="form-select" id="editWordDifficulty">
                                <option value="1">쉬움</option>
                                <option value="2">보통</option>
                                <option value="3">어려움</option>
                                <option value="4">매우 어려움</option>
                                <option value="5">극도 어려움</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">사용여부</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="editIsActive" id="editActiveTrue" value="true">
                                <label class="form-check-label" for="editActiveTrue">활성화</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="editIsActive" id="editActiveFalse" value="false">
                                <label class="form-check-label" for="editActiveFalse">비활성화</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="updateWord()">수정</button>
                </div>
            </div>
        </div>
    </div>


    <!-- 단어 정제 모달 -->
    <div class="modal fade" id="refinementModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>단어 정제</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- 단어 정보 섹션 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <label class="form-label"><strong>단어</strong></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="refinementWord" readonly>
                                <select class="form-select" id="refinementDifficulty">
                                    <option value="1">쉬움</option>
                                    <option value="2">보통</option>
                                    <option value="3">어려움</option>
                                    <option value="4">매우어려움</option>
                                    <option value="5">극도어려움</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label"><strong>카테고리</strong></label>
                            <input type="text" class="form-control" id="refinementCategory" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label"><strong>생성일</strong></label>
                            <input type="text" class="form-control" id="refinementCreatedAt" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label"><strong>상태</strong></label>
                            <input type="text" class="form-control" id="refinementStatus" readonly>
                        </div>
                    </div>

                    <!-- 힌트 섹션 -->
                    <div class="row">
                        <div class="col-12">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6><strong>힌트 관리</strong></h6>
                                <div class="d-flex gap-2">
                                    <button type="button" id="generateNewHintsBtn" class="btn btn-success btn-sm">
                                        <i class="fas fa-plus me-1"></i>힌트 추가
                                    </button>
                                    <button type="button" id="deactivateWordBtn" class="btn btn-danger btn-sm">
                                        <i class="fas fa-ban me-1"></i>비활성
                                    </button>
                                </div>
                            </div>
                            <div id="hintsContainer">
                                <!-- 힌트 필드들이 여기에 동적으로 추가됩니다 -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-1"></i>취소
                    </button>
                    <button type="button" class="btn btn-success" onclick="confirmRefinement()">
                        <i class="fas fa-check me-1"></i>확정하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 일괄변경 모달 -->
    <div class="modal fade" id="batchUpdateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>일괄변경</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <strong>선택된 단어: <span id="selectedCount">0</span>개</strong>
                    </div>
                    <form id="batchUpdateForm">
                        <div class="mb-3">
                            <label class="form-label">변경할 항목</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="updateDifficulty" onchange="toggleDifficultySection()">
                                <label class="form-check-label" for="updateDifficulty">난이도 변경</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="updateActive" onchange="toggleActiveSection()">
                                <label class="form-check-label" for="updateActive">사용여부 변경</label>
                            </div>
                        </div>
                        <div id="difficultySection" class="mb-3" style="display: none;">
                            <label for="batchDifficulty" class="form-label">난이도</label>
                            <select class="form-select" id="batchDifficulty">
                                <option value="1">쉬움</option>
                                <option value="2">보통</option>
                                <option value="3">어려움</option>
                                <option value="4">매우 어려움</option>
                                <option value="5">극도 어려움</option>
                            </select>
                        </div>
                        <div id="activeSection" class="mb-3" style="display: none;">
                            <label class="form-label">사용여부</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="is_active" id="activeTrue" value="true">
                                <label class="form-check-label" for="activeTrue">활성화</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="is_active" id="activeFalse" value="false">
                                <label class="form-check-label" for="activeFalse">비활성화</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="executeBatchUpdate()">변경 실행</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 힌트 생성 모달 -->
    <div class="modal fade" id="hintGenerationModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="fas fa-lightbulb me-2"></i>힌트 생성</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- 단어 정보 -->
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="alert alert-info">
                                <h6 class="mb-2"><i class="fas fa-info-circle me-2"></i>단어 정보</h6>
                                <div class="row">
                                    <div class="col-md-6">
                                        <strong>단어:</strong> <span id="hintWordText"></span>
                                    </div>
                                    <div class="col-md-6">
                                        <strong>카테고리:</strong> <span id="hintWordCategory"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 힌트 생성 옵션 -->
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="overwriteExistingHints" checked>
                                <label class="form-check-label" for="overwriteExistingHints">
                                    기존 힌트 덮어쓰기 (체크 해제 시 기존 힌트가 있으면 생성하지 않음)
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 진행 상태 -->
                    <div class="row mb-4" id="hintGenerationProgress" style="display: none;">
                        <div class="col-12">
                            <div class="alert alert-warning">
                                <div class="d-flex align-items-center">
                                    <div class="spinner-border spinner-border-sm me-3" role="status">
                                        <span class="visually-hidden">로딩 중...</span>
                                    </div>
                                    <span id="hintGenerationStatus">힌트를 생성하고 있습니다...</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 생성 결과 -->
                    <div class="row" id="hintGenerationResult" style="display: none;">
                        <div class="col-12">
                            <div class="alert alert-success">
                                <h6 class="mb-2"><i class="fas fa-check-circle me-2"></i>힌트 생성 완료</h6>
                                <div id="hintGenerationDetails"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 오류 메시지 -->
                    <div class="row" id="hintGenerationError" style="display: none;">
                        <div class="col-12">
                            <div class="alert alert-danger">
                                <h6 class="mb-2"><i class="fas fa-exclamation-triangle me-2"></i>힌트 생성 실패</h6>
                                <div id="hintGenerationErrorMessage"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-info" id="generateHintsBtn" onclick="executeHintGeneration()">
                        <i class="fas fa-lightbulb me-2"></i>힌트 생성
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script>
        let wordsTable;
        let selectedWordIds = [];
        
        // 페이지 로드 시 모든 모달에 접근성 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(function(modal) {
                modal.addEventListener('shown.bs.modal', function () {
                    // 모달이 표시될 때 aria-hidden 제거
                    this.removeAttribute('aria-hidden');
                });
                
                modal.addEventListener('hidden.bs.modal', function () {
                    // 모달이 숨겨질 때 모든 포커스 제거 후 aria-hidden 추가
                    const focusedElements = this.querySelectorAll(':focus');
                    focusedElements.forEach(element => element.blur());
                    
                    // document.body에 포커스 이동
                    document.body.focus();
                    
                    // 약간의 지연 후 aria-hidden 설정
                    setTimeout(() => {
                        this.setAttribute('aria-hidden', 'true');
                    }, 10);
                });
                
                // 모달이 숨겨지기 시작할 때도 포커스 제거
                modal.addEventListener('hide.bs.modal', function () {
                    const focusedElements = this.querySelectorAll(':focus');
                    focusedElements.forEach(element => element.blur());
                    document.body.focus();
                });
            });
        });

        $(document).ready(function() {
            // 통계 데이터 로드
            loadStats();
            
            // DataTables 초기화
            initializeDataTable();
            
            // 파일 업로드 미리보기
            $('#hintFile').on('change', function() {
                previewFile(this);
            });
        });

        // 통계 데이터 로드
        function loadStats() {
            fetch('/admin/api/words/stats')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.data) {
                        const stats = data.data;
                        // API 응답에 맞게 필드명 수정
                        const activeWords = stats.totalActiveWords || 0;
                        const refinedWords = stats.refinedWords || 0;
                        const wordsWithoutHints = stats.wordsWithoutHints || 0;
                        const totalHints = stats.totalHints || 0;
                        
                        document.getElementById('activeWords').textContent = activeWords.toLocaleString();
                        document.getElementById('refinedWords').textContent = refinedWords.toLocaleString();
                        document.getElementById('wordsWithoutHints').textContent = wordsWithoutHints.toLocaleString();
                        document.getElementById('totalHints').textContent = totalHints.toLocaleString();
                    }
                })
                .catch(error => {
                    console.error('통계 로드 오류:', error);
                    // 오류 시 기본값 표시
                    document.getElementById('activeWords').textContent = '0';
                    document.getElementById('refinedWords').textContent = '0';
                    document.getElementById('wordsWithoutHints').textContent = '0';
                    document.getElementById('totalHints').textContent = '0';
                });
        }

        // DataTables 초기화
        function initializeDataTable() {
            wordsTable = $('#wordsDataTable').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/admin/api/words/data',
                    type: 'GET',
                    data: function(d) {
                        d.difficulty_filter = $('#difficultyFilter').val();
                        d.search = $('#keywordSearch').val();
                        d.refinement = $('#refinementFilter').val();
                        d.active_filter = $('#activeFilter').val();
                        console.log('검색 파라미터:', d);
                    }
                },
                columns: [
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return `<input type="checkbox" class="word-checkbox" value="${row.id}" onchange="updateSelectedWords()">`;
                        }
                    },
                    { data: 'category' },
                    { 
                        data: 'word',
                        render: function(data, type, row) {
                            return `<strong>${data}</strong>`;
                        }
                    },
                    { data: 'length' },
                    { 
                        data: 'difficulty_text',
                        render: function(data, type, row) {
                            const difficultyClass = getDifficultyClass(row.difficulty);
                            return `<span class="badge ${difficultyClass}">${data}</span>`;
                        }
                    },
                    { data: 'hints_count' },
                    { 
                        data: 'is_active',
                        render: function(data, type, row) {
                            return data ? 
                                '<span class="badge bg-success">활성</span>' : 
                                '<span class="badge bg-secondary">비활성</span>';
                        }
                    },
                    { 
                        data: 'conf_yn',
                        render: function(data, type, row) {
                            return data === 'Y' ? 
                                '<span class="badge bg-success">정제완료</span>' : 
                                '<span class="badge bg-warning">정제대기</span>';
                        }
                    },
                    
                    { 
                        data: 'created_at',
                        render: function(data, type, row) {
                            if (!data) return '-';
                            // 배열 형태의 날짜 데이터 처리
                            if (Array.isArray(data)) {
                                // [2025,10,22,0,24,35,892187000] 형태를 Date 객체로 변환
                                const date = new Date(data[0], data[1]-1, data[2], data[3], data[4], data[5]);
                                return date.toLocaleDateString();
                            }
                            return new Date(data).toLocaleDateString();
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return `
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="editWord(${row.id})" title="수정">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-warning me-1" onclick="openRefinementModal(${row.id})" title="정제">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-info me-1" onclick="generateHintsForWord(${row.id}, '${row.word}', '${row.category}')" title="힌트 생성">
                                    <i class="fas fa-lightbulb"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deactivateWord(${row.id})" title="비활성화">
                                    <i class="fas fa-ban"></i>
                                </button>
                            `;
                        }
                    }
                ],
                order: [[8, 'desc']], // 입력일자 내림차순
                pageLength: 25,
                language: {
                    processing: "처리중...",
                    lengthMenu: "_MENU_ 개씩 보기",
                    zeroRecords: "데이터가 없습니다.",
                    info: "_START_ - _END_ / _TOTAL_",
                    infoEmpty: "0 - 0 / 0",
                    infoFiltered: "(전체 _MAX_ 개 중 검색결과)",
                    search: "검색:",
                    paginate: {
                        first: "처음",
                        last: "마지막",
                        next: "다음",
                        previous: "이전"
                    }
                }
            });
        }

        // 난이도별 CSS 클래스 반환
        function getDifficultyClass(difficulty) {
            switch(difficulty) {
                case 1: return 'difficulty-easy';
                case 2: return 'difficulty-medium';
                case 3: return 'difficulty-hard';
                case 4: return 'difficulty-very-hard';
                case 5: return 'difficulty-extreme';
                default: return 'bg-secondary';
            }
        }

        // 검색 실행
        function performSearch() {
            console.log('검색 실행:', $('#keywordSearch').val());
            // DataTables의 ajax.reload()를 사용하여 현재 필터 값으로 다시 로드
            wordsTable.ajax.reload();
        }

        // 전체 선택/해제
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.word-checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
            
            updateSelectedWords();
        }

        // 선택된 단어 업데이트
        function updateSelectedWords() {
            selectedWordIds = [];
            const checkboxes = document.querySelectorAll('.word-checkbox:checked');
            
            checkboxes.forEach(checkbox => {
                selectedWordIds.push(parseInt(checkbox.value));
            });
            
            document.getElementById('selectedCount').textContent = selectedWordIds.length;
            
            // 전체 선택 체크박스 상태 업데이트
            const allCheckboxes = document.querySelectorAll('.word-checkbox');
            const checkedCheckboxes = document.querySelectorAll('.word-checkbox:checked');
            const selectAll = document.getElementById('selectAll');
            
            if (checkedCheckboxes.length === 0) {
                selectAll.indeterminate = false;
                selectAll.checked = false;
            } else if (checkedCheckboxes.length === allCheckboxes.length) {
                selectAll.indeterminate = false;
                selectAll.checked = true;
            } else {
                selectAll.indeterminate = true;
            }
        }

        // 단어 추가 모달 열기
        function openAddWordModal() {
            document.getElementById('addWordForm').reset();
            new bootstrap.Modal(document.getElementById('addWordModal')).show();
        }

        // 단어 추가
        function addWord() {
            const category = document.getElementById('wordCategory').value.trim();
            const word = document.getElementById('wordText').value.trim();
            const difficulty = document.getElementById('wordDifficulty').value;

            if (!category || !word || !difficulty) {
                showAlert('warning', '모든 필드를 입력해주세요.');
                return;
            }

            const formData = new FormData();
            formData.append('word', word);
            formData.append('category', category);
            formData.append('difficulty', difficulty);

            fetch('/admin/api/words/add', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('success', data.message);
                    bootstrap.Modal.getInstance(document.getElementById('addWordModal')).hide();
                    wordsTable.ajax.reload();
                    loadStats();
                } else {
                    showAlert('danger', data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('danger', '단어 추가 중 오류가 발생했습니다.');
            });
        }


        // 기존 함수는 제거 (더 이상 사용하지 않음)
        function openAddHintModal() {
            showAlert('warning', '개별 단어의 힌트 추가 버튼을 사용해주세요.');
        }

        // 힌트 타입에 따른 입력 필드 표시/숨김
        function toggleHintInputs() {
            const hintType = document.getElementById('hintType').value;
            const contentDiv = document.getElementById('hintContent').closest('.mb-3');
            const fileDiv = document.getElementById('hintFile').closest('.mb-3');
            const previewDiv = document.getElementById('filePreview');
            
            if (hintType === 'TEXT') {
                contentDiv.style.display = 'block';
                fileDiv.style.display = 'none';
                previewDiv.style.display = 'none';
            } else if (hintType === 'IMAGE' || hintType === 'SOUND') {
                contentDiv.style.display = 'none';
                fileDiv.style.display = 'block';
                previewDiv.style.display = 'none';
            } else {
                contentDiv.style.display = 'block';
                fileDiv.style.display = 'block';
                previewDiv.style.display = 'none';
            }
        }

        // 힌트 추가
        function addHint() {
            const hintType = document.getElementById('hintType').value;
            const difficulty = document.getElementById('hintDifficulty').value;
            const content = document.getElementById('hintContent').value.trim();
            const file = document.getElementById('hintFile').files[0];
            const isPrimary = document.getElementById('isPrimary').checked;

            if (!hintType || !difficulty) {
                showAlert('warning', '힌트 타입과 난이도를 선택해주세요.');
                return;
            }

            if (hintType === 'TEXT' && !content) {
                showAlert('warning', '텍스트 힌트 내용을 입력해주세요.');
                return;
            }

            if ((hintType === 'IMAGE' || hintType === 'SOUND') && !file) {
                showAlert('warning', '파일을 선택해주세요.');
                return;
            }

            // 선택된 단어들에 대해 힌트 추가
            const promises = selectedWordIds.map(wordId => {
                const formData = new FormData();
                formData.append('hintType', hintType);
                formData.append('difficulty', difficulty);
                formData.append('isPrimary', isPrimary);
                
                if (hintType === 'TEXT') {
                    formData.append('content', content);
                } else if (file) {
                    formData.append('file', file);
                }

                return fetch(`/admin/api/words/${wordId}/hints`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        throw new Error(data.message || '힌트 추가 실패');
                    }
                    return { wordId, success: true };
                })
                .catch(error => {
                    console.error(`단어 ${wordId} 힌트 추가 실패:`, error);
                    return { wordId, success: false, error: error.message };
                });
            });

            // 모든 힌트 추가 완료 후 결과 처리
            Promise.all(promises)
                .then(results => {
                    const successCount = results.filter(r => r.success).length;
                    const failCount = results.length - successCount;
                    
                    if (successCount > 0) {
                        showAlert('success', `${successCount}개 단어에 힌트가 성공적으로 추가되었습니다.`);
                        wordsTable.ajax.reload();
                        loadStats();
                    }
                    
                    if (failCount > 0) {
                        showAlert('warning', `${failCount}개 단어의 힌트 추가에 실패했습니다.`);
                    }
                    
                    bootstrap.Modal.getInstance(document.getElementById('addHintModal')).hide();
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('danger', '힌트 추가 중 오류가 발생했습니다.');
                });
        }

        // 힌트 보기
        function loadWordHints(wordId) {
            fetch(`/admin/api/words/${wordId}/hints`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showHintsModal(data.hints, data.word);
                    } else {
                        showAlert('danger', data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('danger', '힌트를 불러오는 중 오류가 발생했습니다.');
                });
        }

        // 힌트 보기 모달 표시
        function showHintsModal(hints, word) {
            let hintsHtml = '';
            
            if (hints.length === 0) {
                hintsHtml = '<div class="alert alert-info"><i class="fas fa-info-circle me-2"></i>등록된 힌트가 없습니다.</div>';
            } else {
                hints.forEach(hint => {
                    const badgeColor = hint.difficulty === 1 ? 'bg-success' : 
                                      hint.difficulty === 2 ? 'bg-warning' : 
                                      hint.difficulty === 3 ? 'bg-danger' : 'bg-secondary';
                    const difficultyText = hint.difficulty === 1 ? '쉬움' : 
                                          hint.difficulty === 2 ? '보통' : 
                                          hint.difficulty === 3 ? '어려움' : '알 수 없음';
                    const iconClass = hint.difficulty === 1 ? 'fa-laugh-beam' : 
                                     hint.difficulty === 2 ? 'fa-meh' : 'fa-dizzy';
                    
                    hintsHtml += `
                        <div class="hint-result-item ${hint.isPrimary ? 'primary' : ''}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="flex-grow-1">
                                    <span class="hint-content">${hint.hintText || '내용 없음'}</span>
                                    <div class="mt-2">
                                        <small class="text-muted">
                                            <i class="fas fa-tag me-1"></i>타입: ${hint.hintType}
                                            ${hint.isPrimary ? '<span class="badge bg-primary ms-2">주요 힌트</span>' : ''}
                                        </small>
                                    </div>
                                </div>
                                <span class="badge ${badgeColor} hint-difficulty-badge">
                                    <i class="fas ${iconClass} me-1"></i>
                                    ${difficultyText}
                                </span>
                            </div>
                        </div>
                    `;
                });
            }
            
            // 힌트 보기 모달에 데이터 설정
            document.getElementById('viewHintsWord').textContent = word.word;
            document.getElementById('viewHintsCategory').textContent = word.category;
            document.getElementById('viewHintsLength').textContent = word.length;
            document.getElementById('viewHintsList').innerHTML = hintsHtml;
            
            // 힌트 보기 모달 표시
            new bootstrap.Modal(document.getElementById('viewHintsModal')).show();
        }

        // 파일 미리보기
        function previewFile(input) {
            const file = input.files[0];
            if (file) {
                const preview = document.getElementById('filePreview');
                const previewContent = document.getElementById('previewContent');
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewContent.innerHTML = `<img src="${e.target.result}" class="img-thumbnail" style="max-width: 200px;">`;
                    };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('audio/')) {
                    previewContent.innerHTML = `<audio controls><source src="${URL.createObjectURL(file)}" type="${file.type}"></audio>`;
                }
                
                preview.style.display = 'block';
            }
        }

        // 일괄변경 모달 열기
        function openBatchUpdateModal() {
            if (selectedWordIds.length === 0) {
                showAlert('warning', '변경할 단어를 선택해주세요.');
                return;
            }
            document.getElementById('batchUpdateForm').reset();
            document.getElementById('difficultySection').style.display = 'none';
            document.getElementById('activeSection').style.display = 'none';
            new bootstrap.Modal(document.getElementById('batchUpdateModal')).show();
        }

        // 난이도 섹션 토글
        function toggleDifficultySection() {
            const section = document.getElementById('difficultySection');
            section.style.display = document.getElementById('updateDifficulty').checked ? 'block' : 'none';
        }

        // 활성화 섹션 토글
        function toggleActiveSection() {
            const section = document.getElementById('activeSection');
            section.style.display = document.getElementById('updateActive').checked ? 'block' : 'none';
        }

        // 일괄변경 실행
        function executeBatchUpdate() {
            const updateDifficulty = document.getElementById('updateDifficulty').checked;
            const updateActive = document.getElementById('updateActive').checked;

            if (!updateDifficulty && !updateActive) {
                showAlert('warning', '변경할 항목을 선택해주세요.');
                return;
            }

            const message = `${selectedWordIds.length}개의 단어를 변경하시겠습니까?`;
            if (!confirm(message)) {
                return;
            }

            // 난이도 변경
            if (updateDifficulty) {
                const newDifficulty = document.getElementById('batchDifficulty').value;
                updateDifficultyBatch(selectedWordIds, newDifficulty);
            }

            // 활성화 상태 변경
            if (updateActive) {
                const isActive = document.querySelector('input[name="is_active"]:checked').value === 'true';
                updateActiveStatusBatch(selectedWordIds, isActive);
            }
        }

        // 일괄 난이도 변경
        function updateDifficultyBatch(wordIds, newDifficulty) {

            wordIds.forEach(id => formData.append('wordIds', id));

            fetch('/admin/api/words/batch-update-difficulty', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('success', data.message);
                    bootstrap.Modal.getInstance(document.getElementById('batchUpdateModal')).hide();
                    wordsTable.ajax.reload();
                    loadStats();
                    document.getElementById('selectAll').checked = false;
                    selectedWordIds = [];
                    updateSelectedWords();
                } else {
                    showAlert('danger', data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('danger', '일괄변경 중 오류가 발생했습니다.');
            });
        }

        // 일괄 활성화 상태 변경
        function updateActiveStatusBatch(wordIds, isActive) {
            const formData = new FormData();
            wordIds.forEach(id => formData.append('wordIds', id));

            })

            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('danger', '일괄변경 중 오류가 발생했습니다.');

        // 단어 수정 모달 열기
        function editWord(id) {
            console.log('editWord 호출됨, id:', id);
            
            // 단어 정보 조회
            fetch(`/admin/api/words/${id}`)
                .then(response => {
                    console.log('API 응답 상태:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('API 응답 데이터:', data);
                    
                    if (data.success && data.data) {
                        const word = data.data;
                        console.log('단어 데이터:', word);
                        
                        // 모달에 데이터 채우기
                        document.getElementById('editWordId').value = word.id || id;
                        document.getElementById('editWordCategory').value = word.category || '';
                        document.getElementById('editWordText').value = word.word || '';
                        document.getElementById('editWordDifficulty').value = word.difficulty || '1';
                        
                        // 사용여부 라디오 버튼 설정
                        if (word.isActive !== undefined) {
                            if (word.isActive) {
                                document.getElementById('editActiveTrue').checked = true;
                            } else {
                                document.getElementById('editActiveFalse').checked = true;
                            }
                        } else {
                            document.getElementById('editActiveTrue').checked = true;
                        }
                        
                        // 모달 열기
                        new bootstrap.Modal(document.getElementById('editWordModal')).show();
                    } else {
                        console.error('API 응답 실패:', data);
                        showAlert('danger', data.error || '단어 정보를 불러올 수 없습니다.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('danger', '단어 정보를 불러오는 중 오류가 발생했습니다.');
                });
        }

        // 단어 수정 실행
        function updateWord() {
            const id = document.getElementById('editWordId').value;
            const category = document.getElementById('editWordCategory').value.trim();
            const word = document.getElementById('editWordText').value.trim();
            const difficulty = document.getElementById('editWordDifficulty').value;
            const isActive = document.querySelector('input[name="editIsActive"]:checked').value === 'true';

            if (!category || !word || !difficulty) {
                showAlert('warning', '모든 필드를 입력해주세요.');
                return;
            }

            const formData = new FormData();
            formData.append('word', word);
            formData.append('category', category);
            formData.append('difficulty', difficulty);
            formData.append('isActive', isActive);

            fetch(`/admin/api/words/update/${id}`, {
                method: 'PUT',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('success', data.message);
                    bootstrap.Modal.getInstance(document.getElementById('editWordModal')).hide();
                    wordsTable.ajax.reload();
                    loadStats();
                } else {
                    showAlert('danger', data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('danger', '단어 수정 중 오류가 발생했습니다.');
            });
        }

        // 단어 비활성화
        function deactivateWord(id) {
            if (!confirm('이 단어를 비활성화하시겠습니까?\n비활성화된 단어는 퍼즐에서 사용되지 않습니다.')) {
                return;
            }

            fetch(`/admin/api/words/deactivate/${id}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('success', data.message);
                    wordsTable.ajax.reload();
                    loadStats();
                } else {
                    showAlert('danger', data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('danger', '단어 비활성화 중 오류가 발생했습니다.');
            });
        }

        // 알림 표시
        function showAlert(type, message) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            // 기존 알림 제거
            document.querySelectorAll('.alert').forEach(alert => alert.remove());
            
            // 새 알림 추가
            document.querySelector('.container').insertAdjacentHTML('afterbegin', alertHtml);
            
            // 3초 후 자동 제거
            setTimeout(() => {
                document.querySelectorAll('.alert').forEach(alert => alert.remove());
            }, 3000);
        }

        // 엔터키로 검색
        document.getElementById('keywordSearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });


        // 정제 모달 관련 변수
        let currentRefinementWordId = null;
        let hintFieldCounter = 0;

        // 정제 모달 열기
        function openRefinementModal(wordId) {
            console.log('openRefinementModal 호출됨, wordId:', wordId);
            currentRefinementWordId = wordId;
            
            // 단어 정보 로드
            fetch(`/admin/api/words/${wordId}/detail`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const word = data.data;
                        
                        // 단어 정보 설정
                        document.getElementById('refinementWord').value = word.word;
                        document.getElementById('refinementDifficulty').value = word.difficulty || 2;
                        document.getElementById('refinementCategory').value = word.category || '';
                        console.log('생성일자 원본:', word.createdAt);
                        const createdDate = word.createdAt ? new Date(word.createdAt).toLocaleDateString() : '';
                        console.log('생성일자 변환:', createdDate);
                        document.getElementById('refinementCreatedAt').value = createdDate;
                        document.getElementById('refinementStatus').value = word.confYn === 'Y' ? '정제완료' : '미정제';
                        
                        // 힌트 정보 표시
                        console.log('API 응답 데이터:', data);
                        console.log('힌트 데이터:', data.hints);
                        displayHintsForRefinement(data.hints);
                        
                        // 모달 표시
                        const modal = new bootstrap.Modal(document.getElementById('refinementModal'));
                        modal.show();
                    } else {
                        showAlert('단어 정보를 불러오는데 실패했습니다.', 'danger');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('단어 정보를 불러오는데 실패했습니다.', 'danger');
                });
        }

        // 정제용 힌트 표시
        function displayHintsForRefinement(hints) {
            console.log('displayHintsForRefinement 호출됨, hints:', hints);
            const container = document.getElementById('hintsContainer');
            container.innerHTML = '';
            hintFieldCounter = 0;
            
            if (hints && hints.length > 0) {
                console.log('힌트 개수:', hints.length);
                hints.forEach((hint, index) => {
                    const hintField = document.createElement('div');
                    hintField.className = 'hint-field mb-3 p-3 border rounded';
                    hintField.setAttribute('data-hint-id', hint.id || '');
                    
                    hintField.innerHTML = `
                        <div class="row">
                            <div class="col-md-8">
                                <label class="form-label">힌트 ${index + 1}</label>
                                <input type="text" class="form-control" value="${hint.hint_text || ''}" placeholder="힌트를 입력하세요">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">난이도</label>
                                <select class="form-select">
                                    <option value="1" ${hint.difficulty == 1 ? 'selected' : ''}>쉬움</option>
                                    <option value="2" ${hint.difficulty == 2 ? 'selected' : ''}>보통</option>
                                    <option value="3" ${hint.difficulty == 3 ? 'selected' : ''}>어려움</option>
                                    <option value="4" ${hint.difficulty == 4 ? 'selected' : ''}>매우어려움</option>
                                    <option value="5" ${hint.difficulty == 5 ? 'selected' : ''}>극도어려움</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">기본힌트</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" ${hint.is_primary ? 'checked' : ''}>
                                    <label class="form-check-label">기본</label>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(hintField);
                });
            } else {
                container.innerHTML = '<p class="text-muted">등록된 힌트가 없습니다.</p>';
            }
        }

        // 힌트 필드 추가
        function addHintField(hintData = null) {
            const container = document.getElementById('hintsContainer');
            const hintId = hintData ? hintData.id : `new_${hintFieldCounter++}`;
            
            const hintField = document.createElement('div');
            hintField.className = 'hint-field position-relative';
            hintField.dataset.hintId = hintId;
            
            const difficultyOptions = [
                { value: 1, text: '쉬움' },
                { value: 2, text: '보통' },
                { value: 3, text: '어려움' },
                { value: 4, text: '매우어려움' },
                { value: 5, text: '극도어려움' }
            ];
            
            const difficultySelect = difficultyOptions.map(option => 
                `<option value="${option.value}" ${hintData && hintData.difficulty == option.value ? 'selected' : ''}>${option.text}</option>`
            ).join('');
            
            hintField.innerHTML = `
                <div class="row">
                    <div class="col-md-8">
                        <input type="text" class="form-control" placeholder="힌트를 입력하세요" 
                               value="${hintData ? hintData.hint_text : ''}" 
                               data-hint-id="${hintId}">
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" data-hint-id="${hintId}">
                            ${difficultySelect}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <div class="primary-checkbox">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" 
                                       ${hintData && hintData.is_primary ? 'checked' : ''} 
                                       data-hint-id="${hintId}">
                                <label class="form-check-label">primary</label>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="remove-hint-btn" onclick="removeHintField(this)">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(hintField);
            
            // primary 체크박스 이벤트 리스너 추가
            const checkbox = hintField.querySelector('.form-check-input');
            checkbox.addEventListener('change', function() {
                updatePrimaryHint(this);
            });
        }

        // 힌트 필드 제거
        function removeHintField(button) {
            button.closest('.hint-field').remove();
        }

        // Primary 힌트 업데이트
        function updatePrimaryHint(checkbox) {
            const hintFields = document.querySelectorAll('.hint-field');
            
            if (checkbox.checked) {
                // 다른 모든 primary 체크박스 해제
                hintFields.forEach(field => {
                    const otherCheckbox = field.querySelector('.form-check-input');
                    if (otherCheckbox !== checkbox) {
                        otherCheckbox.checked = false;
                        field.classList.remove('primary');
                    }
                });
                // 현재 필드에 primary 클래스 추가
                checkbox.closest('.hint-field').classList.add('primary');
            } else {
                // primary 클래스 제거
                checkbox.closest('.hint-field').classList.remove('primary');
            }
        }

        // 비활성 버튼 클릭
        document.getElementById('deactivateWordBtn').addEventListener('click', function() {
            if (!currentRefinementWordId) {
                showAlert('단어 ID가 없습니다.', 'danger');
                return;
            }
            
            if (!confirm('이 단어를 비활성화하시겠습니까?\n비활성화된 단어는 퍼즐에서 사용되지 않습니다.')) {
                return;
            }
            
            // 단어 비활성화 API 호출
            fetch(`/admin/api/words/deactivate/${currentRefinementWordId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('단어가 성공적으로 비활성화되었습니다.', 'success');
                    
                    // 모달 닫기
                    const modalElement = document.getElementById('refinementModal');
                    const modal = bootstrap.Modal.getInstance(modalElement);
                    if (modal) {
                        modal.hide();
                    }
                    
                    // 테이블 새로고침
                    wordsDataTable.ajax.reload();
                } else {
                    showAlert(data.error || '비활성화 중 오류가 발생했습니다.', 'danger');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('비활성화 중 오류가 발생했습니다.', 'danger');
            });
        });

        // 정제 확정
        function confirmRefinement() {
            if (!currentRefinementWordId) {
                showAlert('단어 ID가 없습니다.', 'danger');
                return;
            }
            
            // 힌트 데이터 수집
            const hints = [];
            const hintFields = document.querySelectorAll('.hint-field');
            
            hintFields.forEach(field => {
                const hintId = field.dataset.hintId;
                const hintText = field.querySelector('input[type="text"]').value.trim();
                const difficulty = field.querySelector('select').value;
                const isPrimary = field.querySelector('.form-check-input').checked;
                
                if (hintText) {
                    hints.push({
                        id: hintId,
                        hint_text: hintText,
                        difficulty: parseInt(difficulty),
                        is_primary: isPrimary
                    });
                }
            });
            
            // 단어 난이도
            const wordDifficulty = document.getElementById('refinementDifficulty').value;
            
            // 정제 데이터 전송
            const refinementData = {
                wordId: currentRefinementWordId,
                difficulty: parseInt(wordDifficulty),
                hints: hints
            };
            
            fetch('/admin/api/words/refine', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(refinementData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('정제가 완료되었습니다.', 'success');
                    
                    // 모달 닫기 전에 모든 포커스 제거
                    const modalElement = document.getElementById('refinementModal');
                    const focusedElements = modalElement.querySelectorAll(':focus');
                    focusedElements.forEach(element => element.blur());
                    
                    // document.body에 포커스 이동
                    document.body.focus();
                    
                    const modal = bootstrap.Modal.getInstance(modalElement);
                    modal.hide();
                    
                    // 테이블 새로고침
                    if (wordsTable) {
                        wordsTable.ajax.reload();
                    }
                } else {
                    showAlert(data.message || '정제 중 오류가 발생했습니다.', 'danger');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('정제 중 오류가 발생했습니다.', 'danger');
            });
        }

        // 힌트 생성 관련 변수
        let currentWordId = null;
        let currentWordText = '';
        let currentWordCategory = '';

        // 힌트 생성 모달 열기
        function generateHintsForWord(wordId, wordText, wordCategory) {
            currentWordId = wordId;
            currentWordText = wordText;
            currentWordCategory = wordCategory;

            // 모달 내용 초기화
            document.getElementById('hintWordText').textContent = wordText;
            document.getElementById('hintWordCategory').textContent = wordCategory;
            document.getElementById('overwriteExistingHints').checked = true;
            
            // 상태 초기화
            document.getElementById('hintGenerationProgress').style.display = 'none';
            document.getElementById('hintGenerationResult').style.display = 'none';
            document.getElementById('hintGenerationError').style.display = 'none';
            document.getElementById('generateHintsBtn').disabled = false;

            // 모달 표시
            const modal = new bootstrap.Modal(document.getElementById('hintGenerationModal'));
            modal.show();
        }

        // 힌트 생성 실행
        function executeHintGeneration() {
            if (!currentWordId) {
                showAlert('단어 정보가 없습니다.', 'danger');
                return;
            }

            const overwrite = document.getElementById('overwriteExistingHints').checked;
            
            // UI 상태 변경
            document.getElementById('generateHintsBtn').disabled = true;
            document.getElementById('hintGenerationProgress').style.display = 'block';
            document.getElementById('hintGenerationResult').style.display = 'none';
            document.getElementById('hintGenerationError').style.display = 'none';
            document.getElementById('hintGenerationStatus').textContent = '제미나이 API를 호출하여 힌트를 생성하고 있습니다...';

            // API 호출
            fetch(`/admin/api/hint-generator/word/${currentWordId}?overwrite=${overwrite}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                // 진행 상태 숨기기
                document.getElementById('hintGenerationProgress').style.display = 'none';
                document.getElementById('generateHintsBtn').disabled = false;

                if (data.success) {
                    // 성공 메시지 표시
                    let detailsHtml = '';
                    if (data.hints && data.hints.length > 0) {
                        detailsHtml = '<ul class="mb-0">';
                        data.hints.forEach((hint, index) => {
                            const difficultyText = ['', '쉬움', '보통', '어려움', '매우 어려움', '극도 어려움'][hint.difficulty] || '알 수 없음';
                            detailsHtml += `<li><strong>난이도 ${hint.difficulty} (${difficultyText}):</strong> ${hint.hint_text}</li>`;
                        });
                        detailsHtml += '</ul>';
                    } else {
                        detailsHtml = '<p class="mb-0">생성된 힌트가 없습니다.</p>';
                    }
                    
                    document.getElementById('hintGenerationDetails').innerHTML = detailsHtml;
                    document.getElementById('hintGenerationResult').style.display = 'block';
                    
                    // 테이블 새로고침
                    if (wordsTable) {
                        wordsTable.ajax.reload();
                    }
                } else {
                    // 오류 메시지 표시
                    document.getElementById('hintGenerationErrorMessage').textContent = data.message || '힌트 생성에 실패했습니다.';
                    document.getElementById('hintGenerationError').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                
                // 진행 상태 숨기기
                document.getElementById('hintGenerationProgress').style.display = 'none';
                document.getElementById('generateHintsBtn').disabled = false;
                
                // 오류 메시지 표시
                document.getElementById('hintGenerationErrorMessage').textContent = '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                document.getElementById('hintGenerationError').style.display = 'block';
            });
        }
    </script>
