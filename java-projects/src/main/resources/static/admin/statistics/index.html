<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통계</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; }
    </style>
    </head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="fas fa-chart-bar me-2"></i>시스템 통계</h2>
        <a href="/admin" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>관리자 메인</a>
    </div>

    <div class="row g-3">
        <div class="col-md-3">
            <div class="card text-center p-3">
                <div class="h1" id="stat-active-words">-</div>
                <div class="text-muted">활성 단어</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-3">
                <div class="h1" id="stat-refined-words">-</div>
                <div class="text-muted">정제완료</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-3">
                <div class="h1" id="stat-words-without-hints">-</div>
                <div class="text-muted">힌트미보유</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-3">
                <div class="h1" id="stat-total-hints">-</div>
                <div class="text-muted">전체 힌트</div>
            </div>
        </div>
    </div>

    <div class="mt-4 small text-muted">마지막 업데이트: <span id="last-update">-</span></div>
</div>

<script>
async function loadStats() {
  try {
    const res = await fetch('/admin/api/words/stats');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.success && data.data) {
      const s = data.data;
      document.getElementById('stat-active-words').textContent = (s.totalActiveWords||0).toLocaleString();
      document.getElementById('stat-refined-words').textContent = (s.refinedWords||0).toLocaleString();
      document.getElementById('stat-words-without-hints').textContent = (s.wordsWithoutHints||0).toLocaleString();
      document.getElementById('stat-total-hints').textContent = (s.totalHints||0).toLocaleString();
      document.getElementById('last-update').textContent = new Date().toLocaleString('ko-KR');
    }
  } catch (e) {
    console.error('통계 로드 오류', e);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  setInterval(loadStats, 30000);
});
</script>
</body>
</html>
