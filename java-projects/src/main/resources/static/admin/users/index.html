<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 관리 - 크로스워드 퍼즐 관리자</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        
        .stats-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        
        .stats-card:hover {
            transform: translateY(-2px);
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stats-label {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
        }

        .user-detail-modal .modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }

        .user-info-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .user-activity-item {
            border-left: 3px solid #007bff;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }

        .filter-container {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .data-table-container {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-action {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <!-- 관리자 헤더 -->
    <div class="admin-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1><i class="fas fa-users me-3"></i>사용자 관리</h1>
                    <p class="mb-0">크로스워드 퍼즐 사용자들을 관리하고 모니터링할 수 있습니다.</p>
                </div>
                <div class="col-md-4 text-end">
                    <button class="btn btn-light me-2" onclick="refreshUserList()">
                        <i class="fas fa-sync-alt me-1"></i>새로고침
                    </button>
                    <button class="btn btn-light" onclick="exportUserData()">
                        <i class="fas fa-download me-1"></i>데이터 내보내기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- 퍼즐 관리 네비게이션 -->
        <div class="container mb-4">
            <div class="card">
                <div class="card-body py-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 text-primary">
                            <i class="fas fa-puzzle-piece me-2"></i>퍼즐 관리 바로가기
                        </h6>
                        <div class="d-flex gap-2">
                            <a href="/admin/" class="btn btn-secondary btn-sm">
                                <i class="fas fa-home me-1"></i>퍼즐관리
                            </a>
                            <a href="/admin/words" class="btn btn-primary btn-sm">
                                <i class="fas fa-list me-1"></i>단어관리
                            </a>
                            <a href="/admin/hint-generator" class="btn btn-info btn-sm">
                                <i class="fas fa-magic me-1"></i>AI 힌트관리
                            </a>
                            <a href="/admin/levels" class="btn btn-success btn-sm">
                                <i class="fas fa-layer-group me-1"></i>레벨관리
                            </a>
                            <a href="/admin/templates" class="btn btn-warning btn-sm">
                                <i class="fas fa-th me-1"></i>그리드 템플릿관리
                            </a>
                            <a href="/admin/users" class="btn btn-danger btn-sm">
                                <i class="fas fa-users me-1"></i>사용자관리
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 통계 정보 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="totalUsers">0</div>
                    <div class="stats-label">전체 사용자</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="activeUsers">0</div>
                    <div class="stats-label">활성 사용자</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="newUsersToday">0</div>
                    <div class="stats-label">오늘 가입</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card text-center">
                    <div class="stats-number" id="onlineUsers">0</div>
                    <div class="stats-label">현재 온라인</div>
                </div>
            </div>
        </div>

        <!-- 필터 -->
        <div class="filter-container">
            <h5><i class="fas fa-filter me-2"></i>검색 및 필터</h5>
            <div class="row">
                <div class="col-md-3">
                    <label class="form-label">상태</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">전체</option>
                        <option value="active">활성</option>
                        <option value="inactive">비활성</option>
                        <option value="banned">차단</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">가입일</label>
                    <select class="form-select" id="dateFilter">
                        <option value="">전체</option>
                        <option value="today">오늘</option>
                        <option value="week">이번 주</option>
                        <option value="month">이번 달</option>
                        <option value="year">올해</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">검색</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="이름, 이메일, ID로 검색">
                </div>
                <div class="col-md-2">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-primary w-100" onclick="applyFilters()">
                        <i class="fas fa-search me-1"></i>검색
                    </button>
                </div>
            </div>
        </div>

        <!-- 사용자 목록 테이블 -->
        <div class="data-table-container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5><i class="fas fa-list me-2"></i>사용자 목록</h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" onclick="selectAllUsers()">
                        <i class="fas fa-check-square me-1"></i>전체 선택
                    </button>
                    <button class="btn btn-outline-warning btn-sm" onclick="bulkStatusChange('inactive')">
                        <i class="fas fa-user-slash me-1"></i>선택 비활성화
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="bulkStatusChange('banned')">
                        <i class="fas fa-ban me-1"></i>선택 차단
                    </button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table id="usersTable" class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th width="30">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            </th>
                            <th width="60">아바타</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>상태</th>
                            <th>권한</th>
                            <th>가입일</th>
                            <th>마지막 로그인</th>
                            <th>게임 플레이</th>
                            <th width="150">액션</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 데이터가 여기에 동적으로 로드됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 사용자 상세 정보 모달 -->
    <div class="modal fade" id="userDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-user me-2"></i>사용자 상세 정보
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body user-detail-modal">
                    <div id="userDetailContent">
                        <!-- 사용자 상세 정보가 여기에 로드됩니다 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-warning" onclick="changeUserStatus()">
                        <i class="fas fa-user-edit me-1"></i>상태 변경
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 상태 변경 모달 -->
    <div class="modal fade" id="statusChangeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-user-edit me-2"></i>사용자 상태 변경
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">새로운 상태</label>
                        <select class="form-select" id="newStatus">
                            <option value="active">활성</option>
                            <option value="inactive">비활성</option>
                            <option value="banned">차단</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">사유 (선택사항)</label>
                        <textarea class="form-control" id="statusReason" rows="3" placeholder="상태 변경 사유를 입력하세요"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="confirmStatusChange()">
                        <i class="fas fa-save me-1"></i>변경 저장
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script>
        let usersTable;
        let currentUserId = null;

        $(document).ready(function() {
            initializeUsersTable();
            loadUserStatistics();
        });

        // 사용자 테이블 초기화
        function initializeUsersTable() {
            usersTable = $('#usersTable').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/admin/api/user-management/users-ajax',
                    type: 'GET',
                    data: function(d) {
                        d.status = $('#statusFilter').val();
                        d.dateFilter = $('#dateFilter').val();
                        d.search = $('#searchInput').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return '<input type="checkbox" class="user-checkbox" value="' + row.id + '">';
                        }
                    },
                    {
                        data: 'name',
                        render: function(data, type, row) {
                            const initial = data ? data.charAt(0).toUpperCase() : 'U';
                            return '<div class="user-avatar">' + initial + '</div>';
                        }
                    },
                    { data: 'name' },
                    { data: 'email' },
                    {
                        data: 'status',
                        render: function(data, type, row) {
                            let badgeClass = 'badge-secondary';
                            let statusText = '알 수 없음';
                            
                            switch(data) {
                                case 'active':
                                    badgeClass = 'badge-success';
                                    statusText = '활성';
                                    break;
                                case 'inactive':
                                    badgeClass = 'badge-warning';
                                    statusText = '비활성';
                                    break;
                                case 'banned':
                                    badgeClass = 'badge-danger';
                                    statusText = '차단';
                                    break;
                            }
                            
                            return '<span class="badge ' + badgeClass + ' status-badge">' + statusText + '</span>';
                        }
                    },
                    {
                        data: 'is_admin',
                        render: function(data, type, row) {
                            if (data === true) {
                                return '<span class="badge badge-primary">관리자</span>';
                            } else {
                                return '<span class="badge badge-secondary">일반사용자</span>';
                            }
                        }
                    },
                    {
                        data: 'created_at',
                        render: function(data, type, row) {
                            return data ? new Date(data).toLocaleDateString('ko-KR') : '-';
                        }
                    },
                    {
                        data: 'last_login_at',
                        render: function(data, type, row) {
                            return data ? new Date(data).toLocaleDateString('ko-KR') : '없음';
                        }
                    },
                    {
                        data: 'games_played',
                        render: function(data, type, row) {
                            return data || 0;
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            const adminButton = row.is_admin ? 
                                `<button class="btn btn-sm btn-outline-secondary btn-action" onclick="changeAdminStatus(${row.id}, false)" title="관리자 권한 제거">
                                    <i class="fas fa-user-minus"></i>
                                </button>` :
                                `<button class="btn btn-sm btn-outline-info btn-action" onclick="changeAdminStatus(${row.id}, true)" title="관리자 권한 부여">
                                    <i class="fas fa-user-plus"></i>
                                </button>`;
                            
                            return `
                                <button class="btn btn-sm btn-outline-primary btn-action" onclick="viewUserDetail(${row.id})" title="상세보기">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-warning btn-action" onclick="editUserStatus(${row.id})" title="상태변경">
                                    <i class="fas fa-edit"></i>
                                </button>
                                ${adminButton}
                                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteUser(${row.id})" title="삭제">
                                    <i class="fas fa-trash"></i>
                                </button>
                            `;
                        }
                    }
                ],
                order: [[5, 'desc']], // 가입일 기준 내림차순
                pageLength: 25,
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/ko.json'
                }
            });
        }

        // 사용자 통계 로드
        function loadUserStatistics() {
            $.ajax({
                url: '/admin/api/user-management/statistics',
                type: 'GET',
                success: function(data) {
                    $('#totalUsers').text(data.totalUsers || 0);
                    $('#activeUsers').text(data.activeUsers || 0);
                    $('#newUsersToday').text(data.newUsersToday || 0);
                    $('#onlineUsers').text(data.onlineUsers || 0);
                },
                error: function() {
                    console.error('사용자 통계 로드 실패');
                }
            });
        }

        // 필터 적용
        function applyFilters() {
            usersTable.ajax.reload();
        }

        // 사용자 상세 정보 보기
        function viewUserDetail(userId) {
            currentUserId = userId;
            
            $.ajax({
                url: '/admin/api/user-management/user/' + userId,
                type: 'GET',
                success: function(data) {
                    displayUserDetail(data);
                    $('#userDetailModal').modal('show');
                },
                error: function() {
                    alert('사용자 정보를 불러올 수 없습니다.');
                }
            });
        }

        // 사용자 상세 정보 표시
        function displayUserDetail(user) {
            const content = `
                <div class="row">
                    <div class="col-md-4">
                        <div class="user-info-card text-center">
                            <div class="user-avatar mx-auto mb-3" style="width: 80px; height: 80px; font-size: 2rem;">
                                ${user.name ? user.name.charAt(0).toUpperCase() : 'U'}
                            </div>
                            <h5>${user.name || '이름 없음'}</h5>
                            <p class="text-muted">${user.email}</p>
                            <span class="badge ${getStatusBadgeClass(user.status)}">${getStatusText(user.status)}</span>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="user-info-card">
                            <h6><i class="fas fa-info-circle me-2"></i>기본 정보</h6>
                            <table class="table table-sm">
                                <tr>
                                    <td width="120">가입일:</td>
                                    <td>${user.created_at ? new Date(user.created_at).toLocaleString('ko-KR') : '알 수 없음'}</td>
                                </tr>
                                <tr>
                                    <td>마지막 로그인:</td>
                                    <td>${user.last_login_at ? new Date(user.last_login_at).toLocaleString('ko-KR') : '없음'}</td>
                                </tr>
                                <tr>
                                    <td>게임 플레이:</td>
                                    <td>${user.games_played || 0}회</td>
                                </tr>
                                <tr>
                                    <td>총 점수:</td>
                                    <td>${user.total_score || 0}점</td>
                                </tr>
                            </table>
                        </div>
                        
                        <div class="user-info-card">
                            <h6><i class="fas fa-chart-line me-2"></i>활동 통계</h6>
                            <div class="row text-center">
                                <div class="col-3">
                                    <div class="h5 text-primary">${user.games_played || 0}</div>
                                    <small class="text-muted">게임 플레이</small>
                                </div>
                                <div class="col-3">
                                    <div class="h5 text-success">${user.wins || 0}</div>
                                    <small class="text-muted">승리</small>
                                </div>
                                <div class="col-3">
                                    <div class="h5 text-warning">${user.total_score || 0}</div>
                                    <small class="text-muted">총 점수</small>
                                </div>
                                <div class="col-3">
                                    <div class="h5 text-info">${user.level || 1}</div>
                                    <small class="text-muted">레벨</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            $('#userDetailContent').html(content);
        }

        // 상태 변경
        function editUserStatus(userId) {
            currentUserId = userId;
            $('#statusChangeModal').modal('show');
        }

        // 상태 변경 확인
        function confirmStatusChange() {
            const newStatus = $('#newStatus').val();
            const reason = $('#statusReason').val();
            
            $.ajax({
                url: '/admin/api/user-management/user/' + currentUserId + '/status',
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({
                    status: newStatus,
                    reason: reason
                }),
                success: function() {
                    alert('사용자 상태가 변경되었습니다.');
                    $('#statusChangeModal').modal('hide');
                    usersTable.ajax.reload();
                    loadUserStatistics();
                },
                error: function() {
                    alert('상태 변경에 실패했습니다.');
                }
            });
        }

        // 사용자 삭제
        function deleteUser(userId) {
            if (confirm('정말로 이 사용자를 삭제하시겠습니까?')) {
                $.ajax({
                    url: '/admin/api/user-management/user/' + userId,
                    type: 'DELETE',
                    success: function() {
                        alert('사용자가 삭제되었습니다.');
                        usersTable.ajax.reload();
                        loadUserStatistics();
                    },
                    error: function() {
                        alert('사용자 삭제에 실패했습니다.');
                    }
                });
            }
        }

        // 관리자 권한 변경
        function changeAdminStatus(userId, isAdmin) {
            const action = isAdmin ? '관리자 권한을 부여' : '관리자 권한을 제거';
            if (confirm(`정말로 이 사용자에게 ${action}하시겠습니까?`)) {
                $.ajax({
                    url: '/admin/api/user-management/user/' + userId + '/admin',
                    type: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        isAdmin: isAdmin
                    }),
                    success: function() {
                        alert(`관리자 권한이 ${isAdmin ? '부여' : '제거'}되었습니다.`);
                        usersTable.ajax.reload();
                        loadUserStatistics();
                    },
                    error: function() {
                        alert('관리자 권한 변경에 실패했습니다.');
                    }
                });
            }
        }

        // 전체 선택
        function selectAllUsers() {
            $('.user-checkbox').prop('checked', true);
            $('#selectAll').prop('checked', true);
        }

        // 전체 선택 토글
        function toggleSelectAll() {
            const isChecked = $('#selectAll').is(':checked');
            $('.user-checkbox').prop('checked', isChecked);
        }

        // 일괄 상태 변경
        function bulkStatusChange(status) {
            const selectedUsers = $('.user-checkbox:checked').map(function() {
                return $(this).val();
            }).get();
            
            if (selectedUsers.length === 0) {
                alert('선택된 사용자가 없습니다.');
                return;
            }
            
            if (confirm(`선택된 ${selectedUsers.length}명의 사용자를 ${getStatusText(status)}로 변경하시겠습니까?`)) {
                $.ajax({
                    url: '/admin/api/user-management/bulk-status-change',
                    type: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        userIds: selectedUsers,
                        status: status
                    }),
                    success: function() {
                        alert('선택된 사용자들의 상태가 변경되었습니다.');
                        usersTable.ajax.reload();
                        loadUserStatistics();
                    },
                    error: function() {
                        alert('일괄 상태 변경에 실패했습니다.');
                    }
                });
            }
        }

        // 새로고침
        function refreshUserList() {
            usersTable.ajax.reload();
            loadUserStatistics();
        }

        // 데이터 내보내기
        function exportUserData() {
            window.open('/admin/api/user-management/export', '_blank');
        }

        // 헬퍼 함수들
        function getStatusBadgeClass(status) {
            switch(status) {
                case 'active': return 'badge-success';
                case 'inactive': return 'badge-warning';
                case 'banned': return 'badge-danger';
                default: return 'badge-secondary';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 'active': return '활성';
                case 'inactive': return '비활성';
                case 'banned': return '차단';
                default: return '알 수 없음';
            }
        }
    </script>
</body>
</html>
