<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>힌트 생성 관리 - 크로스워드 퍼즐 관리자</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        
        .stats-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        
        .stats-card:hover {
            transform: translateY(-2px);
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stats-label {
            color: #6c757d;
            font-size: 0.9rem;
        }

        /* 힌트 보기 모달 스타일 */
        .hint-result-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .hint-result-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }

        .hint-result-item.primary {
            border-left: 4px solid #007bff;
            background-color: #f8f9ff;
        }

        .hint-difficulty-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
        }

        .hint-content {
            font-size: 1.1rem;
            font-weight: 500;
            color: #495057;
            margin-top: 8px;
        }

        .word-info {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        
        .admin-nav {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .nav-item {
            margin-bottom: 1rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 8px;
            text-decoration: none;
            color: #495057;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background: #f8f9fa;
            color: #667eea;
        }
        
        .nav-link.active {
            background: #667eea;
            color: white;
        }
        
        .nav-link i {
            margin-right: 0.5rem;
            width: 20px;
        }
        
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background: #667eea;
            border-color: #667eea;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
            border-color: #5a6fd8;
        }
        
        .table th {
            background: #f8f9fa;
            border-top: none;
            font-weight: 600;
        }
        
        .badge {
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- 관리자 헤더 -->
    <div class="admin-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="mb-0">
                        <i class="fas fa-robot me-2"></i>
                        AI 힌트 생성 관리
                    </h1>
                    <p class="mb-0 mt-2">Gemini AI를 활용한 자동 힌트 생성 시스템</p>
                </div>
                <div class="col-md-6 text-end">
                </div>
            </div>
        </div>
    </div>

    <!-- 퍼즐 관리 네비게이션 -->
    <div class="container mb-4">
        <div class="card">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 text-primary">
                        <i class="fas fa-puzzle-piece me-2"></i>퍼즐 관리 바로가기
                    </h6>
                    <div class="d-flex gap-2">
                        <a href="/admin/" class="btn btn-secondary btn-sm">
                            <i class="fas fa-home me-1"></i>퍼즐관리
                        </a>
                        <a href="/admin/words" class="btn btn-primary btn-sm">
                            <i class="fas fa-list me-1"></i>단어관리
                        </a>
                        <a href="/admin/hint-generator" class="btn btn-info btn-sm">
                            <i class="fas fa-magic me-1"></i>AI 힌트관리
                        </a>
                        <a href="/admin/levels" class="btn btn-success btn-sm">
                            <i class="fas fa-layer-group me-1"></i>레벨관리
                        </a>
                        <a href="/admin/templates" class="btn btn-warning btn-sm">
                            <i class="fas fa-th me-1"></i>그리드 템플릿관리
                        </a>
                        <a href="/admin/templates/create" class="btn btn-outline-warning btn-sm">
                            <i class="fas fa-plus me-1"></i>템플릿 생성
                        </a>
                        <a href="/admin/users" class="btn btn-danger btn-sm">
                            <i class="fas fa-users me-1"></i>사용자관리
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 메인 콘텐츠 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <!-- 통계 카드들 -->
                        <div class="row mb-4">
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="totalWords">-</div>
                                    <div class="stats-label">전체 단어</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="wordsWithHints">-</div>
                                    <div class="stats-label">힌트 보유</div>
                            </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="wordsWithoutHints">-</div>
                                    <div class="stats-label">힌트 없음</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="totalHints">-</div>
                                    <div class="stats-label">전체 힌트</div>
                                </div>
                            </div>
                        </div>

                        <!-- 필터 및 검색 -->
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label class="form-label">힌트 상태</label>
                                <select id="hintFilter" class="form-select" onchange="loadWordsTable()">
                                    <option value="">전체</option>
                                    <option value="with_hints">힌트 보유</option>
                                    <option value="without_hints">힌트 없음</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">API 테스트</label>
                                <button class="btn btn-primary d-block" onclick="testAPI()">
                                    <i class="fas fa-plug me-1"></i> API 연결 테스트
                                </button>
                            </div>
                        </div>

                        <!-- DataTables -->
                        <div class="table-responsive">
                            <table id="wordsDataTable" class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th width="50">
                                            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                        </th>
                                        <th>카테고리</th>
                                        <th>단어</th>
                                        <th>글자수</th>
                                        <th>난이도</th>
                                        <th>힌트개수</th>
                                        <th width="120">관리</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- DataTables로 동적 로드 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 힌트 보기 모달 -->
    <div class="modal fade" id="hintsModal" tabindex="-1" aria-labelledby="hintsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="hintsModalLabel">힌트 목록</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="hintsContent">
                        <!-- 힌트 목록이 여기에 표시됩니다 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script>
        let wordsTable;

        $(document).ready(function() {
            // 통계 데이터 로드
            loadStats();
            
            // DataTables 초기화
            initializeDataTable();
        });

        // 통계 데이터 로드
        function loadStats() {
            fetch('/admin/api/hint-generator/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('totalWords').textContent = data.total_words || 0;
                    document.getElementById('wordsWithHints').textContent = data.words_with_hints || 0;
                    document.getElementById('wordsWithoutHints').textContent = data.words_without_hints || 0;
                    document.getElementById('totalHints').textContent = data.total_hints || 0;
                })
                .catch(error => {
                    console.error('통계 로드 오류:', error);
                });
        }

        // DataTables 초기화
        function initializeDataTable() {
            wordsTable = $('#wordsDataTable').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/admin/api/hint-generator/words-ajax',
                    type: 'GET',
                    data: function(d) {
                        return {
                            draw: d.draw,
                            start: d.start,
                            length: d.length,
                            search: d.search.value,
                            orderColumn: d.order[0].column,
                            orderDir: d.order[0].dir,
                            status: $('#hintFilter').val() || ''
                        };
                    }
                },
                columns: [
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return `<input type="checkbox" class="word-checkbox" value="${row.id}" onchange="updateSelectedWords()">`;
                        }
                    },
                    { data: 'category' },
                    { 
                        data: 'word',
                        render: function(data, type, row) {
                            return `<strong>${data}</strong>`;
                        }
                    },
                    { data: 'length' },
                    { 
                        data: 'difficulty_text',
                        render: function(data, type, row) {
                            const difficultyClass = getDifficultyClass(row.difficulty);
                            return `<span class="badge ${difficultyClass}">${data}</span>`;
                        }
                    },
                    { 
                        data: 'hints_count',
                        render: function(data, type, row) {
                            const count = data || 0;
                            const badgeClass = count > 0 ? 'bg-success' : 'bg-secondary';
                            return `<span class="badge ${badgeClass}">${count}개</span>`;
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        render: function(data, type, row) {
                            return `
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="viewHints(${row.id})" title="힌트 보기">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-success" onclick="regenerateHint(${row.id})" title="재생성">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                            `;
                        }
                    }
                ],
                order: [[5, 'desc']], // 힌트 개수 내림차순
                pageLength: 25,
                language: {
                    processing: "처리중...",
                    lengthMenu: "_MENU_ 개씩 보기",
                    zeroRecords: "데이터가 없습니다.",
                    info: "_START_ - _END_ / _TOTAL_",
                    infoEmpty: "0 - 0 / 0",
                    infoFiltered: "(전체 _MAX_ 개 중 검색결과)",
                    search: "검색:",
                    paginate: {
                        first: "처음",
                        last: "마지막",
                        next: "다음",
                        previous: "이전"
                    }
                }
            });
        }

        // 난이도별 CSS 클래스 반환
        function getDifficultyClass(difficulty) {
            switch(difficulty) {
                case 1: return 'bg-success';
                case 2: return 'bg-warning';
                case 3: return 'bg-danger';
                case 4: return 'bg-dark';
                case 5: return 'bg-secondary';
                default: return 'bg-secondary';
            }
        }

        // 전체 선택/해제
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.word-checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
            
            updateSelectedWords();
        }

        // 선택된 단어 업데이트
        function updateSelectedWords() {
            const checkboxes = document.querySelectorAll('.word-checkbox:checked');
            const selectedCount = document.getElementById('selectedCount');
            if (selectedCount) {
                selectedCount.textContent = checkboxes.length;
            }
        }

        // API 테스트
        function testAPI() {
            const button = event.target.closest('button');
            const originalText = button.innerHTML;
            
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> 테스트 중...';
            
            fetch('/admin/api/hint-generator/test-connection')
                .then(response => response.json())
                .then(data => {
                if (data.success) {
                        showAlert('success', 'API 연결 성공!');
                } else {
                        showAlert('error', 'API 연결 실패: ' + data.message);
                    }
                })
                .catch(error => {
                    showAlert('error', 'API 연결 테스트 중 오류가 발생했습니다.');
                })
                .finally(() => {
                    button.disabled = false;
                    button.innerHTML = originalText;
                });
        }

        // 힌트 보기
        function viewHints(wordId) {
            fetch(`/admin/api/hint-generator/word/${wordId}/hints`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.hints && data.hints.length > 0) {
                        showHintsModal(data.hints, wordId);
                    } else {
                        showAlert('info', '이 단어에는 힌트가 없습니다.');
                    }
                })
                .catch(error => {
                    console.error('힌트 조회 실패:', error);
                    showAlert('error', '힌트 조회 중 오류가 발생했습니다.');
                });
        }

        // 힌트 재생성
        function regenerateHint(wordId) {
            if (confirm('기존 힌트를 삭제하고 새로운 힌트를 생성하시겠습니까?')) {
                fetch(`/admin/api/hint-generator/word/${wordId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                if (data.success) {
                        showAlert('success', '힌트 재생성 성공: ' + data.message);
                        loadStats();
                        loadWordsTable();
                } else {
                        showAlert('error', '힌트 재생성 실패: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('힌트 재생성 실패:', error);
                    showAlert('error', '힌트 재생성 중 오류가 발생했습니다.');
                });
            }
        }

        // 힌트 모달 표시
        function showHintsModal(hints, wordId) {
            const hintsContent = document.getElementById('hintsContent');
            let html = '';
            
            hints.forEach((hint, index) => {
                
                const difficultyClass = getDifficultyClass(hint.difficulty);
                const difficultyText = getDifficultyText(hint.difficulty);
                
                html += `
                    <div class="hint-result-item ${hint.isPrimary ? 'primary' : ''}">
                            <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-center mb-2">
                                    <span class="badge ${difficultyClass} hint-difficulty-badge me-2">
                                        ${difficultyText}
                                    </span>
                                    ${hint.isPrimary ? '<span class="badge bg-primary hint-difficulty-badge">Primary</span>' : ''}
                                </div>
                                <div class="hint-content">
                                    ${hint.hintText || '힌트 내용 없음'}
                                </div>
                            </div>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteHint(${hint.id}, ${wordId})" title="삭제">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            hintsContent.innerHTML = html;

            const modalElement = document.getElementById('hintsModal');
            const modal = new bootstrap.Modal(modalElement);
            
            // 모달 표시 전에 aria-hidden 제거
            modalElement.setAttribute('aria-hidden', 'false');
            
            modal.show();
            document.getElementById('hintsModalLabel').textContent = `단어: ${wordId} 힌트 목록`;
            
            // 모달이 숨겨질 때 aria-hidden 복원
            modalElement.addEventListener('hidden.bs.modal', function () {
                modalElement.setAttribute('aria-hidden', 'true');
            });
        }

        // 힌트 삭제
        function deleteHint(hintId, wordId) {
            if (confirm('이 힌트를 삭제하시겠습니까?')) {
                fetch(`/admin/api/hint-generator/hint/${hintId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', '힌트가 삭제되었습니다.');
                        viewHints(wordId); // 모달 새로고침
                        loadStats();
                        loadWordsTable();
                    } else {
                        showAlert('error', data.message);
                    }
                })
                .catch(error => {
                    console.error('힌트 삭제 실패:', error);
                    showAlert('error', '힌트 삭제 중 오류가 발생했습니다.');
                });
            }
        }

        // 난이도 텍스트 반환
        function getDifficultyText(difficulty) {
            switch(difficulty) {
                case 1: return '쉬움';
                case 2: return '보통';
                case 3: return '어려움';
                case 4: return '매우 어려움';
                case 5: return '극도 어려움';
                default: return '알 수 없음';
            }
        }

        // 알림 표시
        function showAlert(type, message) {
            const alertClass = type === 'success' ? 'alert-success' : 
                              type === 'warning' ? 'alert-warning' : 
                              type === 'error' ? 'alert-danger' : 'alert-info';
            
            const alertHtml = `
                <div class="alert ${alertClass} alert-dismissible fade show position-fixed" role="alert" style="top: 20px; right: 20px; z-index: 9999; min-width: 300px;">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', alertHtml);
            
            // 5초 후 자동 제거
            setTimeout(() => {
                const alert = document.querySelector('.alert.show');
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }

        // 테이블 새로고침
        function loadWordsTable() {
            if (wordsTable) {
                wordsTable.ajax.reload();
            }
        }
    </script>
</body>
</html>
