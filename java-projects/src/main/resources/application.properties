# Application Configuration
spring.application.name=board-system
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/mydb?characterEncoding=utf8&useUnicode=true&stringtype=unspecified
spring.datasource.username=myuser
spring.datasource.password=tngkrrhk
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Session Management (Redis)
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=spring:session
spring.session.timeout=1800s
# 쿠키 도메인 설정 (8080과 8081 간 세션 공유)
server.servlet.session.cookie.domain=natus250601.viewdns.net
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.name=JSESSIONID

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging Configuration
logging.level.com.example.board=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=/var/www/html/java-projects/board-debug.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

