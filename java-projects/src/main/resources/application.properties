# Application Configuration
spring.application.name=board-system
server.port=8080
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# 공개 URL (크로스워드·링크와 동일 도메인 기준, 끝에 / 없음)
app.public.base-url=https://k-crossword.com

# nginx 리버스 프록시 뒤에서 X-Forwarded-* 를 반영 (HTTPS·리다이렉트 URL)
server.forward-headers-strategy=framework

# Database Configuration (PostgreSQL) — 비밀번호는 .env 의 NATUS_DB_PASSWORD
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/natus_db?characterEncoding=utf8&useUnicode=true&stringtype=unspecified
spring.datasource.username=natus_user
spring.datasource.password=${NATUS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Session Management (Redis)
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=spring:session
spring.session.timeout=1800s
# 쿠키 도메인 설정 (8080 게시판과 8081 크로스워드 세션 공유, nginx HTTPS 사용)
server.servlet.session.cookie.domain=k-crossword.com
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.name=JSESSIONID

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging Configuration (파일 경로·롤링은 logback-spring.xml, 디렉터리 /home/ubuntu/crossword/log)
logging.level.com.example.board=DEBUG
logging.level.org.springframework.security=DEBUG

# Gemini API Configuration (스프링 부트 기동 시 항상 이 값을 사용)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}

# Remote Database Configuration (운영 서버 동기화) — 비밀번호는 .env 의 REMOTE_DB_PASSWORD
remote.db.host=${REMOTE_DB_HOST:211.47.74.33}
remote.db.port=${REMOTE_DB_PORT:5432}
remote.db.database=${REMOTE_DB_DATABASE:dbrainynux}
remote.db.username=${REMOTE_DB_USERNAME:rainynux}
remote.db.password=${REMOTE_DB_PASSWORD:}
# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
