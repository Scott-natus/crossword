<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'글수정 - ' + ${board.title}">글수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/board">게시판 시스템</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/board/{boardType}(boardType=${boardType.slug})}">
                    <i class="fas fa-list"></i> 목록으로
                </a>
                <a class="nav-link" th:href="@{/board/{boardType}/{id}(boardType=${boardType.slug}, id=${board.id})}">
                    <i class="fas fa-eye"></i> 글보기
                </a>
                <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user"></i> <span sec:authentication="name">사용자</span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/logout}">
                            <i class="fas fa-sign-out-alt"></i> 로그아웃
                        </a></li>
                    </ul>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="fas fa-sign-in-alt"></i> 로그인
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-edit me-2"></i>글수정</h4>
                        <small class="text-muted">게시글을 수정합니다</small>
                    </div>
                    <div class="card-body">
                        <!-- 에러 메시지 표시 -->
                        <div th:if="${param.error != null}" class="alert alert-danger" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span th:if="${param.error[0] == 'unauthorized'}">권한이 없거나 비밀번호가 올바르지 않습니다.</span>
                        </div>
                        
                        <form th:action="@{/board/{boardType}/{id}(boardType=${boardType.slug}, id=${board.id})}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">제목</label>
                                <input type="text" class="form-control" id="title" name="title" 
                                       th:value="${board.title}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="content" class="form-label">내용</label>
                                <textarea class="form-control" id="content" name="content" rows="10" required
                                          th:text="${board.content}"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">비밀번호 확인</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <div class="form-text">수정을 위해 비밀번호를 입력하세요.</div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/board/{boardType}/{id}(boardType=${boardType.slug}, id=${board.id})}" 
                                   class="btn btn-secondary">
                                    <i class="fas fa-times"></i> 취소
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> 수정완료
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
