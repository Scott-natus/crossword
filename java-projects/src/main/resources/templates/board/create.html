<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'글쓰기 - ' + ${boardType.name}">글쓰기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/board">게시판 시스템</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/board/{boardType}(boardType=${boardType.slug})}">
                    <i class="fas fa-list"></i> 목록으로
                </a>
                <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user"></i> <span sec:authentication="name">사용자</span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/logout}">
                            <i class="fas fa-sign-out-alt"></i> 로그아웃
                        </a></li>
                    </ul>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="fas fa-sign-in-alt"></i> 로그인
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="'글쓰기 - ' + ${boardType.name}">글쓰기</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/board/{boardType}(boardType=${boardType.slug})}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="title" class="form-label">제목</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="content" class="form-label">내용</label>
                                <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="files" class="form-label">첨부파일 (최대 50MB)</label>
                                <input type="file" class="form-control" id="files" name="files" multiple 
                                       accept=".jpg,.jpeg,.png,.gif,.pdf,.txt,.xls,.xlsx,.ppt,.pptx,.doc,.docx,.hwp">
                                <div class="form-text">이미지, PDF, 엑셀, TXT, PPT, Word, HWP 파일만 업로드 가능합니다.</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">비밀번호</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <div class="form-text">게시글 수정/삭제 시 사용됩니다.</div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/board/{boardType}(boardType=${boardType.slug})}" 
                                   class="btn btn-secondary">취소</a>
                                <button type="submit" class="btn btn-primary">등록</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
