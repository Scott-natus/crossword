<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${boardType.name} + ' - 게시판 시스템'">게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">게시판 시스템</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 th:text="${boardType.name}">게시판</h2>
                    <div>
                        <a th:href="@{/board/{boardType}/create(boardType=${boardType.slug})}" 
                           class="btn btn-primary" sec:authorize="isAuthenticated()">글쓰기</a>
                    </div>
                </div>
                
                <p class="text-muted" th:text="${boardType.description}">게시판 설명</p>
                
                <!-- 검색 폼 -->
                <form th:action="@{/board/{boardType}(boardType=${boardType.slug})}" method="get" class="mb-3">
                    <div class="row">
                        <div class="col-md-8">
                            <input type="text" name="search" class="form-control" 
                                   th:value="${search}" placeholder="제목, 내용, 작성자로 검색">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-outline-secondary">검색</button>
                            <a th:href="@{/board/{boardType}(boardType=${boardType.slug})}" 
                               class="btn btn-outline-secondary">전체</a>
                        </div>
                    </div>
                </form>
                
                <!-- 게시글 목록 -->
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>제목</th>
                                <th>작성자</th>
                                <th>작성일</th>
                                <th>조회수</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="board : ${boards.content}">
                                <td>
                                    <a th:href="@{/board/{boardType}/{id}(boardType=${boardType.slug}, id=${board.id})}" 
                                       th:text="${board.title}">제목</a>
                                    <span th:if="${board.attachments.size() > 0}" class="badge bg-secondary ms-1">첨부</span>
                                </td>
                                <td th:text="${board.user.name}">작성자</td>
                                <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</td>
                                <td th:text="${board.views}">조회수</td>
                            </tr>
                            <tr th:if="${boards.content.isEmpty()}">
                                <td colspan="4" class="text-center text-muted">등록된 게시글이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 페이지네이션 -->
                <nav th:if="${boards.totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${boards.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/board/{boardType}(boardType=${boardType.slug}, page=${boards.number - 1}, search=${search})}">이전</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, boards.totalPages - 1)}" 
                            th:classappend="${i == boards.number} ? 'active'">
                            <a class="page-link" th:href="@{/board/{boardType}(boardType=${boardType.slug}, page=${i}, search=${search})}" 
                               th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${boards.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/board/{boardType}(boardType=${boardType.slug}, page=${boards.number + 1}, search=${search})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
