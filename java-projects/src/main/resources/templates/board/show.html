<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title} + ' - 게시판 시스템'">게시글</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">게시판 시스템</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h2 th:text="${board.title}">제목</h2>
                        <div class="text-muted">
                            작성자: <span th:text="${board.user.name}">작성자</span> | 
                            작성일: <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span> | 
                            조회수: <span th:text="${board.views}">조회수</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div th:utext="${board.content}">내용</div>
                    </div>
                </div>
                
                <!-- 첨부파일 -->
                <div th:if="${board.attachments.size() > 0}" class="card mt-3">
                    <div class="card-header">
                        <h5>첨부파일</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="attachment : ${board.attachments}">
                            <a th:href="@{/storage/{filePath}(filePath=${attachment.filePath})}" 
                               th:text="${attachment.originalName}" 
                               class="btn btn-outline-secondary btn-sm me-2">첨부파일</a>
                        </div>
                    </div>
                </div>
                
                <!-- 댓글 -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h5>댓글</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="comment : ${comments}">
                            <div class="border-bottom pb-2 mb-2">
                                <strong th:text="${comment.user.name}">작성자</strong>
                                <small class="text-muted ms-2" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</small>
                                <p th:text="${comment.content}" class="mt-1">댓글 내용</p>
                            </div>
                        </div>
                        <div th:if="${comments.isEmpty()}" class="text-muted">
                            등록된 댓글이 없습니다.
                        </div>
                    </div>
                </div>
                
                <!-- 트리 구조 (원글~답글) -->
                <div th:if="${thread.size() > 0}" class="card mt-3">
                    <div class="card-header">
                        <h5>원글~답글 트리</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="post : ${thread}">
                            <div class="border-bottom pb-2 mb-2">
                                <strong th:text="${post.title}">제목</strong>
                                <small class="text-muted ms-2" th:text="${post.user.name}">작성자</small>
                                <small class="text-muted ms-2" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</small>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 버튼 -->
                <div class="mt-3">
                    <a th:href="@{/board/{boardType}(boardType=${board.boardType.slug})}" 
                       class="btn btn-secondary">목록으로</a>
                    <a th:href="@{/board/{boardType}/{id}/edit(boardType=${board.boardType.slug}, id=${board.id})}" 
                       class="btn btn-primary ms-2" 
                       sec:authorize="isAuthenticated()"
                       th:if="${board.user.email == authentication.name or authentication.name == 'rainynux@gmail.com'}">수정</a>
                    <button type="button" class="btn btn-danger ms-2" 
                            data-bs-toggle="modal" data-bs-target="#deleteModal"
                            sec:authorize="isAuthenticated()"
                            th:if="${board.user.email == authentication.name or authentication.name == 'rainynux@gmail.com'}">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 삭제 모달 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">게시글 삭제</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/board/{boardType}/{id}/delete(boardType=${board.boardType.slug}, id=${board.id})}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="text-danger small">삭제 시 복구할 수 없습니다.</div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
