<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title} + ' - 게시판 시스템'">게시글</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .board-content {
            line-height: 1.8;
            font-size: 1.1em;
        }
        
        .board-meta {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        
        .attachment-item {
            display: inline-block;
            margin: 0.25rem;
        }
        
        .comment-item {
            border-left: 3px solid #e9ecef;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        
        .comment-item:hover {
            border-left-color: #0d6efd;
            background-color: #f8f9fa;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/board">
                <i class="fas fa-comments me-2"></i>게시판 시스템
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-cog me-1"></i>관리자
                </a>
                <a class="nav-link" href="/login" sec:authorize="!isAuthenticated()">
                    <i class="fas fa-sign-in-alt me-1"></i>로그인
                </a>
                <div class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user me-1"></i><span sec:authentication="name">사용자</span>
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="/logout">
                            <i class="fas fa-sign-out-alt me-1"></i>로그아웃
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <!-- 게시글 정보 -->
                <div class="board-meta">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h1 class="h3 mb-2" th:text="${board.title}">제목</h1>
                            <div class="text-muted">
                                <i class="fas fa-user"></i> <span th:text="${board.user.name}">작성자</span> | 
                                <i class="fas fa-calendar"></i> <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span> | 
                                <i class="fas fa-eye"></i> <span th:text="${board.views}">조회수</span>
                            </div>
                        </div>
                        <div>
                            <a th:href="@{/board/{boardType}(boardType=${board.boardType.slug})}" 
                               class="btn btn-outline-secondary me-2">
                                <i class="fas fa-list"></i> 목록으로
                            </a>
                            <a th:href="@{/board/{boardType}/{id}/edit(boardType=${board.boardType.slug}, id=${board.id})}" 
                               class="btn btn-outline-primary me-2" sec:authorize="isAuthenticated()">
                                <i class="fas fa-edit"></i> 수정
                            </a>
                            <button class="btn btn-outline-danger" 
                                    data-bs-toggle="modal" 
                                    data-bs-target="#deleteModal" 
                                    sec:authorize="isAuthenticated()">
                                <i class="fas fa-trash"></i> 삭제
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 게시글 내용 -->
                <div class="card">
                    <div class="card-body">
                        <div class="board-content" th:utext="${board.content}">내용</div>
                    </div>
                </div>
                
                <!-- 첨부파일 -->
                <div th:if="${board.attachments != null and board.attachments.size() > 0}" class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fas fa-paperclip"></i> 첨부파일</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="attachment : ${board.attachments}" class="attachment-item">
                            <a th:href="@{/storage/{filePath}(filePath=${attachment.filePath})}" 
                               th:text="${attachment.originalName}" 
                               class="btn btn-outline-secondary btn-sm">
                                <i class="fas fa-download"></i> <span th:text="${attachment.originalName}">첨부파일</span>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 댓글 작성 폼 -->
                <div sec:authorize="isAuthenticated()" class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fas fa-comment-plus"></i> 댓글 작성</h5>
                    </div>
                    <div class="card-body">
                        <form id="commentForm" th:action="@{/board/{boardType}/{id}/comment(boardType=${board.boardType.slug}, id=${board.id})}" method="post">
                            <div class="mb-3">
                                <textarea name="content" class="form-control" rows="3" placeholder="댓글을 입력하세요..." required></textarea>
                            </div>
                            <div class="d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane"></i> 댓글 작성
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- 댓글 목록 -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fas fa-comments"></i> 댓글 <span class="badge bg-primary" th:text="${comments.size()}">0</span></h5>
                    </div>
                    <div class="card-body">
                        <div th:each="comment : ${comments}" class="comment-item">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong th:text="${comment.user.name}">댓글 작성자</strong>
                                    <small class="text-muted ms-2" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</small>
                                </div>
                                <div sec:authorize="isAuthenticated()">
                                    <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteComment(' + ${comment.id} + ')'">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <p th:text="${comment.content}" class="mt-2 mb-0">댓글 내용</p>
                        </div>
                        <div th:if="${comments == null or comments.isEmpty()}" class="text-center text-muted py-4">
                            <i class="fas fa-comment-slash fa-2x mb-2"></i><br>
                            등록된 댓글이 없습니다.
                        </div>
                    </div>
                </div>
                
                <!-- 트리 구조 (원글~답글) -->
                <div th:if="${thread != null and thread.size() > 0}" class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fas fa-sitemap"></i> 원글~답글 트리</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="post : ${thread}">
                            <div class="border-bottom pb-2 mb-2">
                                <a th:href="@{/board/{boardType}/{id}(boardType=${post.boardType.slug}, id=${post.id})}" 
                                   th:text="${post.title}" 
                                   class="text-decoration-none fw-bold">제목</a>
                                <small class="text-muted ms-2">
                                    <i class="fas fa-user"></i> <span th:text="${post.user.name}">작성자</span> | 
                                    <i class="fas fa-calendar"></i> <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 액션 버튼 -->
                <div class="mt-4 d-flex justify-content-between">
                    <div>
                        <a th:href="@{/board/{boardType}(boardType=${board.boardType.slug})}" 
                           class="btn btn-secondary">
                            <i class="fas fa-list"></i> 목록으로
                        </a>
                    </div>
                    <div sec:authorize="isAuthenticated()" 
                         th:if="${authentication != null and (board.user.email == authentication.name or authentication.name == 'rainynux@gmail.com')}">
                        <a th:href="@{/board/{boardType}/{id}/edit(boardType=${board.boardType.slug}, id=${board.id})}" 
                           class="btn btn-primary">
                            <i class="fas fa-edit"></i> 수정
                        </a>
                        <button type="button" class="btn btn-danger ms-2" 
                                data-bs-toggle="modal" data-bs-target="#deleteModal">
                            <i class="fas fa-trash"></i> 삭제
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">게시글 삭제</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>정말로 이 게시글을 삭제하시겠습니까?</p>
                    <p><strong th:text="${board.title}">제목</strong></p>
                    <div class="mb-3">
                        <label for="deletePassword" class="form-label">비밀번호</label>
                        <input type="password" class="form-control" id="deletePassword" name="password" required>
                        <div class="form-text">
                            <span sec:authorize="hasRole('ADMIN')">관리자: 관리자 비밀번호를 입력하세요</span>
                            <span sec:authorize="!hasRole('ADMIN')">작성자: 게시글 비밀번호를 입력하세요</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <form th:action="@{/board/{boardType}/{id}/delete(boardType=${board.boardType.slug}, id=${board.id})}" 
                          method="post" style="display: inline;">
                        <input type="password" name="password" id="deletePasswordForm" style="display: none;">
                        <button type="submit" class="btn btn-danger" onclick="copyPassword()">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function deleteComment(commentId) {
            if (confirm('댓글을 삭제하시겠습니까?')) {
                // 폼 생성하여 POST 요청
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = window.location.pathname + '/comment/' + commentId + '/delete';
                
                // CSRF 토큰 추가 (Spring Security 사용 시)
                const csrfToken = document.querySelector('meta[name="_csrf"]');
                if (csrfToken) {
                    const csrfInput = document.createElement('input');
                    csrfInput.type = 'hidden';
                    csrfInput.name = '_token';
                    csrfInput.value = csrfToken.getAttribute('content');
                    form.appendChild(csrfInput);
                }
                
                document.body.appendChild(form);
                form.submit();
            }
        }
        
        function copyPassword() {
            const passwordInput = document.getElementById('deletePassword');
            const passwordForm = document.getElementById('deletePasswordForm');
            passwordForm.value = passwordInput.value;
        }
    </script>
</body>
</html>
