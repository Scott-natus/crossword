<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/project/kalisco/images/favicon.ico">
    <title>캘리스코 프로젝트 - 환영합니다</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .welcome-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .feature-list {
            text-align: left;
            margin: 2rem 0;
        }
        .feature-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .feature-item:last-child {
            border-bottom: none;
        }
        .feature-icon {
            color: #667eea;
            margin-right: 1rem;
            font-size: 1.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="logo">
            <i class="bi bi-building"></i>
        </div>
        <h1>캘리스코 프로젝트</h1>
        <p class="subtitle">Kalisco Project - Business Management System</p>
        
        <div class="feature-list">
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>회원 관리 시스템</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>제품 관리 시스템</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>발주 관리 시스템</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>매출 관리 시스템</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>프로모션 관리</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>조직 관리</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-check-circle-fill feature-icon"></i>
                <span>데이터 분석</span>
            </div>
        </div>
        
        <p class="text-muted mt-4 mb-4">
            <small>시스템이 준비되면 로그인 페이지로 이동합니다.</small>
        </p>
        
        <div class="d-flex gap-2 justify-content-center flex-wrap">
            <a href="/project/kalisco/sales/crawling/saleSituation/" class="btn btn-primary">
                <i class="bi bi-graph-up-arrow me-2"></i>
                OHRF 데이터 크롤링
            </a>
            <button class="btn btn-secondary" disabled>
                <i class="bi bi-hourglass-split me-2"></i>
                준비 중...
            </button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
