# Application Configuration
spring.application.name=kalisco-project
server.port=9091
server.servlet.context-path=/project/kalisco

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/kalisco_db?characterEncoding=utf8&useUnicode=true&stringtype=unspecified
spring.datasource.username=myuser
spring.datasource.password=tngkrrhk
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging Configuration
logging.level.com.kalisco=DEBUG
logging.file.name=/var/www/html/project/kalisco/logs/kalisco.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
