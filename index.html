<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크로스워드 퍼즐 시스템</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .service-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
        }
        .service-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .service-card h3 {
            margin: 0 0 15px 0;
            color: #667eea;
            font-size: 1.3em;
        }
        .service-card p {
            margin: 0;
            color: #666;
            line-height: 1.5;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 10px;
        }
        .status.active {
            background: #d4edda;
            color: #155724;
        }
        .status.inactive {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 크로스워드 퍼즐 시스템</h1>
        <p>Spring Boot 기반 크로스워드 퍼즐 게임 및 관리 시스템</p>
        
        <div class="service-grid">
            <a href="/K-CrossWord/" class="service-card">
                <h3>🎮 크로스워드 게임</h3>
                <p>실시간 크로스워드 퍼즐 게임을 즐기세요</p>
                <span class="status active">서비스 중</span>
            </a>
            
            <a href="http://222.100.103.227:8081/K-CrossWord/admin/" class="service-card">
                <h3>⚙️ 퍼즐 관리 시스템</h3>
                <p>단어 관리, AI 힌트 생성, 레벨 관리</p>
                <span class="status active">서비스 중</span>
            </a>
            
            <a href="/api/board/" class="service-card">
                <h3>📋 게시판 시스템</h3>
                <p>게시판 관리 및 커뮤니티 기능</p>
                <span class="status active">서비스 중</span>
            </a>
            
            <div class="service-card">
                <h3>📱 모바일 앱</h3>
                <p>React Native 기반 모바일 애플리케이션</p>
                <span class="status inactive">서비스 정지</span>
            </div>
        </div>
        
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #e9ecef; color: #666; font-size: 0.9em;">
            <p><strong>서버 정보:</strong> 222.100.103.227 | <strong>업데이트:</strong> 2025-09-19</p>
        </div>
    </div>
</body>
</html>
